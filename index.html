<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StageMaster 4.52</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding-top: env(safe-area-inset-top, 10px); 
            transition: background-color 0.3s; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        .header h1 { margin: 5px 0; font-size: 1.8rem; color: #bf953f; text-transform: uppercase; font-weight: 900; }
        .header h1 span { text-transform: lowercase; font-size: 1.2rem; }
        .card { background: #2d2d2d; padding: 0.8rem; border-radius: 20px; width: 94%; max-width: 450px; text-align: center; position: relative; z-index: 10; box-sizing: border-box; }
        
        .mode-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 10px; }
        .mode-btn { height: 45px; background: #3d3d3d; color: #888; border-radius: 12px; font-size: 0.8rem; border: 2px solid transparent; -webkit-user-select: none; user-select: none; }
        .mode-btn.active { background: #bf953f; color: black; border-color: white; }

        .tulip-box { display: none; background: white; padding: 8px; border-radius: 15px; margin-bottom: 12px; justify-content: center; align-items: center; border: 3px solid #bf953f; box-sizing: border-box; }
        .tulip-img { max-width: 100%; max-height: 180px; object-fit: contain; }

        .metric { margin: 8px 0; padding: 10px; border-radius: 15px; background: #3d3d3d; position: relative; overflow: hidden; -webkit-user-select: none; user-select: none; }
        .total-box { border-left: 6px solid #ea4335; }
        .partial-box { border-left: 6px solid #1a73e8; background: #253b5e; }
        .go-flash { animation: flashing-green 0.5s infinite; }
        @keyframes flashing-green { 0% { background: #3d3d3d; } 50% { background: #34a853; } 100% { background: #3d3d3d; } }
        
        .panic-mode { animation: panic-bg 0.5s infinite; }
        @keyframes panic-bg { 0% { background-color: #1a1a1a; } 50% { background-color: #7a1a1a; } 100% { background-color: #1a1a1a; } }

        .label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }
        .value { font-size: 4rem; font-weight: bold; font-family: monospace; line-height: 1; }
        
        button { border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; touch-action: none; position: relative; overflow: hidden; -webkit-user-select: none; user-select: none; }
        .start-btn { background-color: #34a853; color: white; font-size: 1.4rem; height: 65px; width: 100%; margin-top: 10px; }
        .stop-btn { background-color: #ea4335; color: white; font-size: 1.4rem; height: 65px; width: 100%; margin-top: 10px; }
