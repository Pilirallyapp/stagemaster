<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>StageMaster Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; color: white; margin: 0; padding-top: env(safe-area-inset-top, 10px); }
        .card { background: #2d2d2d; padding: 1rem; border-radius: 20px; width: 94%; max-width: 450px; text-align: center; margin-top: 10px; }
        .value { font-size: 4rem; font-weight: bold; font-family: monospace; }
        .speed-val { color: #fbbc05; font-size: 5.5rem; }
        .metric { margin: 10px 0; padding: 10px; background: #3d3d3d; border-radius: 15px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 20px; border-radius: 15px; font-weight: bold; border: none; margin-top: 10px; font-size: 1.2rem; }
        .start-btn { background: #34a853; color: white; }
        .reset-btn { background: #1a73e8; color: white; height: 80px; font-size: 1.5rem; }
        #status { font-size: 0.7rem; color: #888; margin-top: 15px; border-top: 1px solid #444; padding-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div class="metric">
        <div id="currSpeed" class="value speed-val">0</div>
        <div>KM/H</div>
    </div>
    <div class="metric">
        <div id="total" class="value">0.00</div>
        <div>TOTAL KM</div>
    </div>
    <div class="metric" style="background: #253b5e;">
        <div id="partial" class="value">0.00</div>
        <div>PARTIAL KM</div>
    </div>
    <div class="stats-grid">
        <div class="metric">
            <div id="timer" style="font-size: 1.5rem; font-family: monospace;">00:00:00</div>
            <div>TIME</div>
        </div>
        <div class="metric">
            <div id="avgSpeed" style="font-size: 1.5rem; font-family: monospace;">0.0</div>
            <div>AVG KM/H</div>
        </div>
    </div>
    <button id="toggleBtn" class="start-btn">START</button>
    <button id="resetPartialBtn" class="reset-btn">RESET PARTIAL</button>
    <div id="status">Ready - Version 2</div>
</div>

<script>
    let totalDist = parseFloat(localStorage.getItem('savedTotal')) || 0;
    let partialDist = parseFloat(localStorage.getItem('savedPartial')) || 0;
    let accumulatedTime = parseInt(localStorage.getItem('savedTime')) || 0;
    let isTracking = false;
    let watchId = null;
    let lastCoords = null;
    let startTime = null;
    let timerInterval = null;

    function updateDisplay() {
        document.getElementById('total').innerText = totalDist.toFixed(2);
        document.getElementById('partial').innerText = partialDist.toFixed(2);
        const t = accumulatedTime + (isTracking ? Date.now() - startTime : 0);
        const h = Math.floor(t / 3600000).toString().padStart(2, '0');
        const m = Math.floor((t % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((t % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        if (t > 0) document.getElementById('avgSpeed').innerText = (totalDist / (t / 3600000)).toFixed(1);
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function onLocation(pos) {
        const { latitude, longitude, speed, accuracy } = pos.coords;
        if (accuracy > 30) return; 
        
        document.getElementById('currSpeed').innerText = Math.round((speed || 0) * 3.6);
        
        if (isTracking && lastCoords) {
            const d = calculateDistance(lastCoords.lat, lastCoords.lon, latitude, longitude);
            const timeDiff = (Date.now() - lastCoords.time) / 3600000;
            if (d > 0.001 && (d / timeDiff) < 200) {
                totalDist += d;
                partialDist += d;
                localStorage.setItem('savedTotal', totalDist);
                localStorage.setItem('savedPartial', partialDist);
            }
        }
        lastCoords = { lat: latitude, lon: longitude, time: Date.now() };
        updateDisplay();
    }

    document.getElementById('toggleBtn').onclick = () => {
        isTracking = !isTracking;
        if (isTracking) {
            startTime = Date.now();
            watchId = navigator.geolocation.watchPosition(onLocation, null, { enableHighAccuracy: true });
            timerInterval = setInterval(updateDisplay, 1000);
            document.getElementById('toggleBtn').innerText = "STOP";
            document.getElementById('toggleBtn').style.background = "#ea4335";
        } else {
            navigator.geolocation.clearWatch(watchId);
            clearInterval(timerInterval);
            accumulatedTime += Date.now() - startTime;
            localStorage.setItem('savedTime', accumulatedTime);
            document.getElementById('toggleBtn').innerText = "RESUME";
            document.getElementById('toggleBtn').style.background = "#34a853";
        }
    };

    document.getElementById('resetPartialBtn').onclick = () => {
        partialDist = 0;
        localStorage.setItem('savedPartial', 0);
        updateDisplay();
    };

    updateDisplay();
</script>
</body>
</html>
