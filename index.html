<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StageMaster 3.41</title>

    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; background-color: #1a1a1a; color: white; overflow-x: hidden; padding-top: env(safe-area-inset-top, 10px); }
        .header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 2px; color: #bf953f; text-transform: uppercase; display: inline-block; font-weight: 900; }
        .card { background: #2d2d2d; padding: 1rem; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); text-align: center; width: 94%; max-width: 450px; position: relative; }
        .metric { margin: 6px 0; padding: 8px; border-radius: 15px; background: #3d3d3d; position: relative; overflow: hidden; }
        
        .total-box { border-left: 6px solid #ea4335; position: relative; }
        .partial-box { border-left: 6px solid #1a73e8; background: #253b5e; position: relative; }
        
        /* Progress Bars - Forced White for Long Presses */
        #progress-bar { position: absolute; bottom: 0; left: 0; height: 10px; background: #ffffff !important; width: 0%; z-index: 5; }
        #stop-progress-bar { position: absolute; bottom: 0; left: 0; height: 10px; background: #ffffff !important; width: 0%; border-radius: 0 0 12px 12px; }
        #partial-long-press-bar { position: absolute; bottom: 0; left: 0; height: 10px; background: #ffffff !important; width: 0%; z-index: 5; }

        .label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 4rem; font-weight: bold; font-family: monospace; line-height: 1; margin: 2px 0; }
        .speed-val { font-size: 5.5rem; color: #fbbc05; line-height: 0.9; }
        
        button { padding: 12px; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; touch-action: manipulation; position: relative; overflow: hidden; }
        .start-btn { background-color: #34a853; color: white; font-size: 1.4rem; height: 60px; margin-top: 10px; }
        .stop-btn { background-color: #ea4335; color: white; font-size: 1.4rem; height: 60px; margin-top: 10px; }
        .reset-partial-btn { background-color: #1a73e8; color: white; font-size: 1.6rem; height: 85px; margin-top: 10px; border-bottom: 5px solid #0d47a1; }
        
        #reportModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #2d2d2d; width: 90%; max-width: 400px; padding: 20px; border-radius: 25px; border: 2px solid #bf953f; text-align: center; }
    </style>
</head>
<body>

<div class="header"><h1>STAGEMASTER BY PILI</h1></div>

<div class="card">
    <div class="metric">
        <div class="label">Current Speed</div>
        <div id="currSpeed" class="value speed-val">0</div>
        <div id="accuracy" style="font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; font-weight: bold; margin-top: 5px; display: inline-block;">GPS: OFFLINE</div>
    </div>

    <div class="metric total-box" id="totalArea">
        <div class="label">Total (Hold 3s to Reset)</div>
        <div id="total" class="value">0.00</div>
        <div id="progress-bar"></div>
    </div>

    <div id="partialBox" class="metric partial-box">
        <div class="label">Partial Distance</div>
        <div id="partial" class="value">0.00</div>
        <div id="partial-long-press-bar"></div>
    </div>

    <button id="toggleBtn" class="start-btn">START TRACKING</button>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;">
        <div style="background: #3d3d3d; padding: 10px; border-radius: 12px;">
            <div class="label">Time</div>
            <div id="timer" style="font-size: 1.5rem; font-weight: bold; font-family: monospace;">00:00:00</div>
        </div>
        <div style="background: #3d3d3d; padding: 10px; border-radius: 12px;">
            <div class="label">Avg Speed</div>
            <div id="speed" style="font-size: 1.5rem; font-weight: bold; font-family: monospace;">0.0</div>
        </div>
    </div>

    <button id="resetPartialBtn" class="reset-partial-btn">RESET PARTIAL</button>
    <div style="font-size: 0.6rem; color: #555; margin-top: 10px;">version 3.41</div>
</div>

<div id="reportModal">
    <div class="modal-content">
        <div style="color: #bf953f; font-size: 1.4rem; margin-bottom: 15px; font-weight: bold;">STAGE COMPLETE</div>
        <div id="modalData" style="text-align: left; margin-bottom: 20px; font-family: monospace; color: white;"></div>
        <button class="start-btn" onclick="exportKML()">EXPORT TO GOOGLE MAPS</button>
        <button class="stop-btn" style="height: 40px; margin-top: 15px; background-color: #555;" onclick="closeModal()">CLOSE & RESUME</button>
    </div>
</div>

<script>
    let totalDist = parseFloat(localStorage.getItem('savedTotal')) || 0;
    let partialDist = parseFloat(localStorage.getItem('savedPartial')) || 0;
    let accumulatedTime = parseFloat(localStorage.getItem('savedAccumulatedTime')) || 0; 
    let watchId = null, lastCoords = null, timerInterval = null, sessionStartTime = null, wakeLock = null;
    let isWaitingForAccuracy = false, trackPoints = [], waypoints = [], globalWpCounter = 1;
    let isAutoPaused = false, stopTimeStart = null, resumeStrikeStartTime = null, lastAlt = null;

    function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

    function filterAltitude(newAlt, distanceMoved) {
        if (lastAlt === null) { lastAlt = newAlt; return newAlt; }
        if (Math.abs(newAlt - lastAlt) > 10 && distanceMoved < 0.02) return lastAlt;
        lastAlt = newAlt; return newAlt;
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function updateStats(position) {
        const { latitude, longitude, accuracy, speed, altitude } = position.coords;
        const currentSpeedKmh = speed ? speed * 3.6 : 0;
        const accEl = document.getElementById('accuracy');
        accEl.innerText = `Acc: ${accuracy.toFixed(1)}m`;
        accEl.style.background = accuracy < 15 ? "#34a853" : "#ea4335";
        document.getElementById('currSpeed').innerText = Math.round(currentSpeedKmh);

        if (isWaitingForAccuracy && accuracy <= 10) {
            isWaitingForAccuracy = false; speak("Now you can go!");
            sessionStartTime = Date.now(); startTimer();
            lastCoords = { latitude, longitude, altitude: altitude || 0, time: Date.now() };
            return;
        }

        if (accuracy > 40 || isWaitingForAccuracy) return; 

        if (currentSpeedKmh < 1.0) {
            resumeStrikeStartTime = null; 
            if (!isAutoPaused && !stopTimeStart) stopTimeStart = Date.now();
            if (!isAutoPaused && stopTimeStart && (Date.now() - stopTimeStart > 60000)) {
                isAutoPaused = true; speak("Measurement Paused");
                accumulatedTime += (Date.now() - sessionStartTime);
                clearInterval(timerInterval);
            }
        } else if (currentSpeedKmh >= 2.0) {
            stopTimeStart = null;
            if (isAutoPaused) {
                if (!resumeStrikeStartTime) resumeStrikeStartTime = Date.now();
                if (Date.now() - resumeStrikeStartTime >= 3000) { 
                    isAutoPaused = false; speak("Measurement Resumed");
                    sessionStartTime = Date.now(); startTimer();
                }
            }
        }

        if (isAutoPaused || !lastCoords) {
             if (!isAutoPaused) lastCoords = { latitude, longitude, altitude: altitude || 0, time: Date.now() };
             return;
        }

        const d = calculateDistance(lastCoords.latitude, lastCoords.longitude, latitude, longitude);
        if (d > 0.002) { 
            const filteredEle = filterAltitude(altitude || 0, d);
            totalDist += d; partialDist += d;
            document.getElementById('total').innerText = totalDist.toFixed(2);
            document.getElementById('partial').innerText = partialDist.toFixed(2);
            const currentElapsed = accumulatedTime + (Date.now() - sessionStartTime);
            document.getElementById('speed').innerText = (totalDist / (currentElapsed / 3600000)).toFixed(1);
            trackPoints.push({ lat: latitude, lon: longitude, ele: filteredEle });
            lastCoords = { latitude, longitude, altitude: filteredEle, time: Date.now() };
        }
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const ms = accumulatedTime + (Date.now() - sessionStartTime);
            const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000), s = Math.floor((ms % 60000) / 1000);
            document.getElementById('timer').innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }, 1000);
    }

    // --- STOP BUTTON LOGIC ---
    let stopPressTimer, stopProgress = 0;
    const tBtn = document.getElementById('toggleBtn');
    tBtn.addEventListener('touchstart', (e) => {
        if (tBtn.innerText === "START TRACKING") return;
        e.preventDefault(); stopProgress = 0;
        if (!document.getElementById('stop-progress-bar')) {
            const pb = document.createElement('div'); pb.id = 'stop-progress-bar'; tBtn.appendChild(pb);
        }
        stopPressTimer = setInterval(() => {
            stopProgress += 2; document.getElementById('stop-progress-bar').style.width = stopProgress + "%";
            if (stopProgress >= 100) { clearInterval(stopPressTimer); handleStopSession(); }
        }, 60);
    });
    tBtn.addEventListener('touchend', () => {
        if (tBtn.innerText === "START TRACKING") { startTracking(); return; }
        clearInterval(stopPressTimer); if (document.getElementById('stop-progress-bar')) document.getElementById('stop-progress-bar').style.width = "0%";
    });

    async function startTracking() {
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        isWaitingForAccuracy = true; speak("Waiting for GPS accuracy");
        watchId = navigator.geolocation.watchPosition(updateStats, null, { enableHighAccuracy: true });
        tBtn.innerText = "STOP"; tBtn.className = "stop-btn";
    }

    function handleStopSession() {
        if (!isAutoPaused && sessionStartTime) accumulatedTime += (Date.now() - sessionStartTime);
        clearInterval(timerInterval); navigator.geolocation.clearWatch(watchId);
        watchId = null; isAutoPaused = false;
        tBtn.innerText = "RESUME"; tBtn.className = "start-btn";
        const rlyCount = waypoints.filter(w => w.name.includes('S') || w.name.includes('RP')).length;
        document.getElementById('modalData').innerHTML = `DISTANCE: ${totalDist.toFixed(2)} KM<br>RALLY WAYPOINTS: ${rlyCount}<br>AVG SPEED: ${document.getElementById('speed').innerText} KM/H<br>TIME: ${document.getElementById('timer').innerText}`;
        document.getElementById('reportModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('reportModal').style.display = 'none'; speak("Ready to resume"); }

    // --- TOTAL KM RESET LOGIC (White Bar Fixed) ---
    let totalPressTimer, totalProgress = 0;
    document.getElementById('totalArea').addEventListener('touchstart', (e) => {
        e.preventDefault(); totalProgress = 0;
        totalPressTimer = setInterval(() => {
            totalProgress += 2; document.getElementById('progress-bar').style.width = totalProgress + "%";
            if (totalProgress >= 100) {
                clearInterval(totalPressTimer); totalDist = 0; partialDist = 0; accumulatedTime = 0;
                localStorage.clear(); document.getElementById('total').innerText = "0.00"; 
                document.getElementById('partial').innerText = "0.00"; document.getElementById('timer').innerText = "00:00:00";
                document.getElementById('speed').innerText = "0.0"; document.getElementById('progress-bar').style.width = "0%";
                speak("All data reset");
            }
        }, 60);
    });
    window.addEventListener('touchend', () => { clearInterval(totalPressTimer); document.getElementById('progress-bar').style.width = "0%"; });

    // --- PARTIAL RESET LOGIC ---
    let partialPressTimer, partialProgress = 0, clickCount = 0, clickTimer;
    const pBtn = document.getElementById('resetPartialBtn');
    pBtn.addEventListener('touchstart', (e) => {
        e.preventDefault(); partialProgress = 0;
        partialPressTimer = setInterval(() => {
            partialProgress += 2; document.getElementById('partial-long-press-bar').style.width = partialProgress + "%";
            if (partialProgress >= 100) { 
                clearInterval(partialPressTimer); handlePartialAction('long'); 
                document.getElementById('partial-long-press-bar').style.width = "0%";
            }
        }, 60);
    });
    pBtn.addEventListener('touchend', () => {
        clearInterval(partialPressTimer); 
        if (partialProgress < 100) {
            document.getElementById('partial-long-press-bar').style.width = "0%";
            clickCount++;
            if (clickCount === 1) clickTimer = setTimeout(() => { handlePartialAction('single'); clickCount = 0; }, 300);
            else if (clickCount === 2) { clearTimeout(clickTimer); handlePartialAction('double'); clickCount = 0; }
        }
    });

    function handlePartialAction(type) {
        if (!lastCoords) return;
        const d = totalDist.toFixed(2);
        let name = "", speakText = "";
        if (type === 'long') { name = "Pin"; speakText = `No S saved at ${d} kilometers`; }
        else if (type === 'double') { name = `RP${globalWpCounter++}`; speakText = `Radio Point ${globalWpCounter-1} saved at ${d} kilometers`; }
        else { name = `S${globalWpCounter++}`; speakText = `S ${globalWpCounter-1} saved at ${d} kilometers`; }
        waypoints.push({ lat: lastCoords.latitude, lon: lastCoords.longitude, ele: lastCoords.altitude, name: `${name} | ${d}KM` });
        speak(speakText);
        partialDist = 0; document.getElementById('partial').innerText = "0.00";
    }

    function exportKML() {
        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>StageMaster Path</name>`;
        waypoints.forEach(wp => {
            kml += `<Placemark><name>${wp.name}</name><Point><coordinates>${wp.lon},${wp.lat},${wp.ele}</coordinates></Point></Placemark>`;
        });
        kml += `<Placemark><name>Editable Path</name><Style><LineStyle><color>ff0000ff</color><width>4</width></LineStyle></Style><LineString><altitudeMode>relativeToGround</altitudeMode><coordinates>`;
        trackPoints.forEach(pt => { kml += `${pt.lon},${pt.lat},${pt.ele} `; });
        kml += `</coordinates></LineString></Placemark></Document></kml>`;
        const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `StageMaster_v341.kml`; a.click();
    }
</script>
</body>
</html>
