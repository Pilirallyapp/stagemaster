<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StageMaster 4.23</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; color: white; margin: 0; padding-top: env(safe-area-inset-top, 10px); transition: background-color 0.3s; }
        .header h1 { margin: 10px 0; font-size: 1.8rem; color: #bf953f; text-transform: uppercase; font-weight: 900; }
        .header h1 span { text-transform: lowercase; font-size: 1.2rem; }
        .card { background: #2d2d2d; padding: 1rem; border-radius: 20px; width: 94%; max-width: 450px; text-align: center; position: relative; z-index: 10; }
        
        .mode-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 15px; }
        .mode-btn { height: 45px; background: #3d3d3d; color: #888; border-radius: 12px; font-size: 0.8rem; border: 2px solid transparent; }
        .mode-btn.active { background: #bf953f; color: black; border-color: white; }

        .metric { margin: 8px 0; padding: 10px; border-radius: 15px; background: #3d3d3d; position: relative; overflow: hidden; }
        .total-box { border-left: 6px solid #ea4335; }
        .partial-box { border-left: 6px solid #1a73e8; background: #253b5e; }
        .go-flash { animation: flashing-green 0.5s infinite; }
        @keyframes flashing-green { 0% { background: #3d3d3d; } 50% { background: #34a853; } 100% { background: #3d3d3d; } }
        
        .panic-mode { animation: panic-bg 0.5s infinite; }
        @keyframes panic-bg { 0% { background-color: #1a1a1a; } 50% { background-color: #7a1a1a; } 100% { background-color: #1a1a1a; } }

        .label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }
        .value { font-size: 4rem; font-weight: bold; font-family: monospace; line-height: 1; }
        
        button { border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; touch-action: none; position: relative; overflow: hidden; }
        .start-btn { background-color: #34a853; color: white; font-size: 1.4rem; height: 65px; width: 100%; margin-top: 10px; }
        .stop-btn { background-color: #ea4335; color: white; font-size: 1.4rem; height: 65px; width: 100%; margin-top: 10px; }
        .reset-partial-btn { background-color: #1a73e8; color: white; font-size: 1.6rem; height: 90px; width: 100%; margin-top: 10px; border-bottom: 5px solid #0d47a1; }
        
        .toolbar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; width: 100%; }
        .wp-btn { height: 110px; background: #1a1a1a; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: none; }
        .progress-ring { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; background: conic-gradient(transparent 0deg, #444 0deg); z-index: 1; }
        .wp-btn::after { content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px; background: #1a1a1a; border-radius: 50%; z-index: 2; }
        .wp-btn img { width: 65px; height: 65px; object-fit: contain; z-index: 3; margin-bottom: 2px; }
        .wp-label { font-size: 0.7rem; font-weight: bold; z-index: 3; }

        #reportModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #2d2d2d; width: 85%; padding: 25px; border-radius: 25px; border: 2px solid #bf953f; text-align: center; }
    </style>
</head>
<body onload="checkStateRecovery()">

<div class="header"><h1>STAGEMASTER <span>by</span> PILI</h1></div>

<div class="card">
    <div class="mode-container">
        <button id="modeRec" class="mode-btn active" onclick="switchMode('REC')">REC MODE</button>
        <button id="modeNav" class="mode-btn" onclick="switchMode('NAV')">NAV MODE</button>
    </div>

    <div id="navControls" style="display: none; margin-bottom: 10px;">
        <input type="file" id="kmlInput" accept=".kml,application/vnd.google-earth.kml+xml,text/xml,application/xml" style="display: none;" onchange="startImport(event)">
        <button id="importBtn" class="start-btn" style="background-color: #1a73e8; height: 50px; font-size: 1rem;" onclick="document.getElementById('kmlInput').click()">IMPORT KML PATH</button>
    </div>

    <div class="metric">
        <div class="label">Speed KM/H</div>
        <div id="currSpeed" class="value" style="color:#fbbc05; font-size: 5rem;">0</div>
        <div id="accuracy" style="font-size: 0.7rem; padding: 4px 10px; border-radius: 10px; font-weight: bold; display: inline-block; background: #ea4335;">GPS: OFFLINE</div>
    </div>

    <div class="metric total-box" id="totalArea">
        <div class="label" id="totalLabel">Total (HOLD 3S TO RESET)</div>
        <div id="total" class="value">0.00</div>
    </div>

    <div class="metric partial-box">
        <div class="label" id="partialLabel">Partial KM</div>
        <div id="partial" class="value">0.00</div>
        <div id="wpTargetDisplay" style="font-size: 0.8rem; color: #fbbc05; font-weight: bold; margin-top: 5px; display: none;">TARGET: ---</div>
    </div>

    <button id="toggleBtn" class="start-btn">START TRACKING</button>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
        <div style="background: #3d3d3d; padding: 10px; border-radius: 12px;"><div class="label">Time</div><div id="timer" style="font-size: 1.4rem; font-weight: bold; font-family: monospace;">00:00:00</div></div>
        <div style="background: #3d3d3d; padding: 10px; border-radius: 12px;"><div class="label">Avg KM/H</div><div id="speed" style="font-size: 1.4rem; font-weight: bold; font-family: monospace;">0.0</div></div>
    </div>

    <button id="resetPartialBtn" class="reset-partial-btn">RESET PARTIAL</button>

    <div class="toolbar" id="recorderToolbar">
        <button class="wp-btn" id="btn-rp">
            <div class="progress-ring" id="ring-rp"></div>
            <img src="https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Yellow-thunder.png">
            <div class="wp-label" style="color: #fbbc05;">R P</div>
        </button>
        <button class="wp-btn" id="btn-nos">
            <div class="progress-ring" id="ring-nos"></div>
            <img src="https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/blue_pin.png"> 
            <div class="wp-label" style="color: #1a73e8;">NO S</div>
        </button>
        <button class="wp-btn" id="btn-marshal">
            <div class="progress-ring" id="ring-marshal"></div>
            <img src="https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Orange-marshal.png">
            <div class="wp-label" style="color: #e67e22;">MARSHAL</div>
        </button>
    </div>

    <div style="font-size: 0.6rem; color: #666; margin-top: 15px;">version 4.23</div>
</div>

<div id="reportModal">
    <div class="modal-content">
        <div style="color: #bf953f; font-size: 1.4rem; font-weight: bold; margin-bottom: 20px;">STAGE SUMMARY</div>
        <div id="modalData" style="text-align: left; font-family: monospace; color: white; margin-bottom: 5px; line-height: 1.6;"></div>
        <div class="stage-input-group">
            <input type="text" id="stageName" class="stage-input" placeholder="Name Stage (e.g. SS1)">
            <button id="saveNameBtn" class="confirm-name-btn" onclick="saveFileName()">SAVE</button>
        </div>
        <button id="exportBtn" class="start-btn" onclick="exportKML()">DOWNLOAD KML FILE</button>
        <button class="stop-btn" style="background: #555; height: 50px; margin-top: 15px;" onclick="closeModal()">CLOSE & RESUME</button>
    </div>
</div>

<script>
    let totalDist = 0, partialDist = 0, accumulatedTime = 0;
    let watchId = null, lastCoords = null, timerInterval = null, sessionStartTime = null, wakeLock = null;
    let isWaitingForAccuracy = false, trackPoints = [], waypoints = [], globalWpCounter = 1;
    let isAutoPaused = false, stopTimeStart = null, resumeStrikeStartTime = null;
    let currentMode = 'REC';
    
    let navWaypoints = [];
    let navPathCoords = [];
    let activeWpIndex = 0;
    let lastOffTrackWarning = 0;
    let navStarted = false;
    let isOffTrack = false;
    let wpMarkersHit = { p2km: false, p1km: false, p500: false, p150: false, p50: false };
    let accuracyAchieved = false;
    let isManualPaused = false;
    
    let offTrackAnchor = null; 
    let isWrongWay = false;
    let wrongWayInterval = null;
    let wrongWayStrikeCount = 0; 
    let mainBtn = null; 

    const ICONS = {
        start: 'https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Start-flag.png',
        finish: 'https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Flying-flag.png',
        s: 'https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Orange-marshal.png',
        rp: 'https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Yellow-thunder.png',
        nos: 'https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/blue_pin.png'
    };

    function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
    
    async function requestWakeLock() { 
        try { 
            if ('wakeLock' in navigator) { 
                wakeLock = await navigator.wakeLock.request('screen'); 
            } 
        } catch (err) {} 
    }
    
    function releaseWakeLock() { 
        if (wakeLock !== null) { 
            wakeLock.release().then(() => { wakeLock = null; }); 
        } 
    }

    function formatWpName(name) {
        let clean = name.split('|')[0].trim();
        if (clean.toUpperCase().startsWith('RP')) return clean.replace(/RP/i, 'Radio Point ');
        if (clean.toUpperCase().startsWith('S')) return clean.replace(/S/i, 'S ');
        return clean;
    }

    function saveStateToVault() {
        const state = {
            totalDist, partialDist, accumulatedTime,
            activeWpIndex, navStarted, currentMode,
            globalWpCounter, trackPoints, waypoints,
            navWaypoints, navPathCoords, wpMarkersHit,
            isManualPaused, isAutoPaused, accuracyAchieved,
            isOffTrack, offTrackAnchor, isWrongWay,
            timestamp: Date.now()
        };
        localStorage.setItem('stagemaster_vault', JSON.stringify(state));
    }

    function checkStateRecovery() {
        mainBtn = document.getElementById('toggleBtn'); 
        const vaultData = localStorage.getItem('stagemaster_vault');
        if (!vaultData) return;
        try {
            const state = JSON.parse(vaultData);
            if (Date.now() - state.timestamp > 7200000) {
                localStorage.removeItem('stagemaster_vault');
                return;
            }
            totalDist = state.totalDist;
            partialDist = state.partialDist;
            accumulatedTime = state.accumulatedTime;
            activeWpIndex = state.activeWpIndex;
            navStarted = state.navStarted;
            globalWpCounter = state.globalWpCounter || 1;
            trackPoints = state.trackPoints || [];
            waypoints = state.waypoints || [];
            navWaypoints = state.navWaypoints || [];
            navPathCoords = state.navPathCoords || [];
            wpMarkersHit = state.wpMarkersHit || wpMarkersHit;
            isManualPaused = state.isManualPaused || false;
            isAutoPaused = state.isAutoPaused || false;
            accuracyAchieved = state.accuracyAchieved || false;
            isOffTrack = state.isOffTrack || false;
            offTrackAnchor = state.offTrackAnchor || null;
            isWrongWay = state.isWrongWay || false;

            switchMode(state.currentMode || 'REC');

            document.getElementById('total').innerText = totalDist.toFixed(2);
            
            if (currentMode === 'NAV' && isOffTrack && offTrackAnchor) {
                document.getElementById('partialLabel').innerText = "Return to Track (Meters)";
                document.getElementById('partial').innerText = "---";
            } else {
                document.getElementById('partial').innerText = partialDist.toFixed(2);
            }

            const ms = accumulatedTime;
            const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

            if (navWaypoints.length > 0) {
                updateTargetDisplay();
            }

            if (isManualPaused || (!watchId && navStarted)) {
                mainBtn.innerText = "RESUME";
                mainBtn.className = "start-btn";
                mainBtn.style.background = "#34a853";
                isManualPaused = true;
            } else if (watchId) {
                mainBtn.innerText = "PAUSE";
                mainBtn.className = "stop-btn";
                mainBtn.style.background = "#ea4335";
                if (navStarted) startTimer();
            }
            
            if (isOffTrack || isWrongWay) document.body.classList.add('panic-mode');
            if (isWrongWay) triggerWrongWayAudioLoop();
            
            requestWakeLock();
            speak("Session recovered from memory vault.");
        } catch(e) {
            localStorage.removeItem('stagemaster_vault');
        }
    }

    function clearVault() {
        localStorage.removeItem('stagemaster_vault');
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('modeRec').classList.toggle('active', mode === 'REC');
        document.getElementById('modeNav').classList.toggle('active', mode === 'NAV');
        document.getElementById('recorderToolbar').style.display = (mode === 'REC') ? 'grid' : 'none';
        document.getElementById('navControls').style.display = (mode === 'NAV') ? 'block' : 'none';
        document.getElementById('wpTargetDisplay').style.display = (mode === 'NAV') ? 'block' : 'none';
        document.getElementById('resetPartialBtn').style.display = (mode === 'REC') ? 'block' : 'none';
        document.getElementById('totalLabel').innerText = (mode === 'NAV') ? 'Distance to Finish' : 'Total (HOLD 3S TO RESET)';
        
        if (mode === 'NAV' && isOffTrack) {
            document.getElementById('partialLabel').innerText = "Return to Track (Meters)";
        } else if (mode === 'NAV' && isWrongWay) {
            document.getElementById('partialLabel').innerText = "WRONG WAY!";
        } else {
            document.getElementById('partialLabel').innerText = (mode === 'NAV') ? 'Distance to WP' : 'Partial KM';
        }

        mainBtn = document.getElementById('toggleBtn');
        if (mainBtn && !isManualPaused && !watchId) {
            mainBtn.innerText = (mode === 'NAV') ? "START NAVIGATION" : "START TRACKING";
            mainBtn.className = "start-btn";
            mainBtn.style.background = "#34a853";
        }
        
        if (mode === 'NAV' && navWaypoints.length > 0) {
            document.getElementById('importBtn').style.backgroundColor = "#34a853";
            document.getElementById('importBtn').innerText = `COMPLETED: ${activeWpIndex} / ${navWaypoints.length}`;
        } else if (mode === 'NAV') {
            document.getElementById('importBtn').style.backgroundColor = "#1a73e8";
            document.getElementById('importBtn').innerText = "IMPORT KML PATH";
        }
        updateTargetDisplay();
        speak(mode === 'REC' ? "Recording mode" : "Navigation mode");
    }

    function startImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
            navWaypoints = [];
            navPathCoords = [];

            const placemarks = xmlDoc.getElementsByTagName("Placemark");
            for (let i = 0; i < placemarks.length; i++) {
                const name = placemarks[i].getElementsByTagName("name")[0]?.textContent || "";
                const descNode = placemarks[i].getElementsByTagName("description")[0];
                const description = descNode ? descNode.textContent.trim() : "";
                
                const point = placemarks[i].getElementsByTagName("Point")[0];
                if (point) {
                    const coords = point.getElementsByTagName("coordinates")[0].textContent.trim().split(",");
                    navWaypoints.push({ 
                        name: name, 
                        desc: description, 
                        lon: parseFloat(coords[0]), 
                        lat: parseFloat(coords[1]) 
                    });
                }

                const line = placemarks[i].getElementsByTagName("LineString")[0];
                if (line) {
                    const pts = line.getElementsByTagName("coordinates")[0].textContent.trim().split(/\s+/);
                    pts.forEach(p => {
                        if (p.trim()) {
                            const c = p.split(",");
                            navPathCoords.push({ lon: parseFloat(c[0]), lat: parseFloat(c[1]) });
                        }
                    });
                }
            }

            if (navPathCoords.length === 0) {
                const globalLines = xmlDoc.getElementsByTagName("LineString");
                for (let j = 0; j < globalLines.length; j++) {
                    const pts = globalLines[j].getElementsByTagName("coordinates")[0].textContent.trim().split(/\s+/);
                    pts.forEach(p => {
                        if (p.trim()) {
                            const c = p.split(",");
                            navPathCoords.push({ lon: parseFloat(c[0]), lat: parseFloat(c[1]) });
                        }
                    });
                }
            }

            document.getElementById('importBtn').style.backgroundColor = "#34a853";
            document.getElementById('importBtn').innerText = "LOADED: " + navWaypoints.length + " WP";
            activeWpIndex = 0;
            navStarted = false;
            accuracyAchieved = false;
            isManualPaused = false;
            isOffTrack = false;
            offTrackAnchor = null;
            stopWrongWayAudioLoop();
            document.body.classList.remove('panic-mode');
            updateTargetDisplay();
            saveStateToVault();
            speak(navWaypoints.length + " waypoints UPLOADED.");
        };
        reader.readAsText(file);
    }

    function updateTargetDisplay() {
        if (currentMode !== 'NAV') return;
        
        if (!navStarted && navWaypoints.length > 0) {
            document.getElementById('wpTargetDisplay').innerText = "TARGET: START GATE";
            return;
        }

        if (navWaypoints[activeWpIndex]) {
            let name = navWaypoints[activeWpIndex].name.split('|')[0].trim();
            document.getElementById('wpTargetDisplay').innerText = "TARGET: " + name;
        }
        if (navWaypoints.length > 0) {
            document.getElementById('importBtn').innerText = `COMPLETED: ${activeWpIndex} / ${navWaypoints.length}`;
        }
    }

    function calculateHaverDist(l1, lo1, l2, lo2) {
        const R = 6371;
        const dLat = (l2-l1)*Math.PI/180, dLon = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function findClosestPathIndex(lat, lon) {
        let minD = 999, closestIdx = 0;
        for (let i = 0; i < navPathCoords.length; i++) {
            let d = calculateHaverDist(lat, lon, navPathCoords[i].lat, navPathCoords[i].lon);
            if (d < minD) { minD = d; closestIdx = i; }
        }
        return closestIdx;
    }

    function findForwardNearestWaypointIndex(lat, lon) {
        let targetIndex = activeWpIndex;
        let minWpDist = 999;
        for (let i = activeWpIndex; i < navWaypoints.length; i++) {
            let d = calculateHaverDist(lat, lon, navWaypoints[i].lat, navWaypoints[i].lon);
            if (d < minWpDist) {
                minWpDist = d;
                targetIndex = i;
            }
        }
        return targetIndex;
    }

    function calculateDistanceAlongPath(startIdx, endIdx) {
        let total = 0;
        if (startIdx >= endIdx) return 0;
        for (let i = startIdx; i < endIdx; i++) {
            total += calculateHaverDist(navPathCoords[i].lat, navPathCoords[i].lon, navPathCoords[i+1].lat, navPathCoords[i+1].lon);
        }
        return total;
    }

    function triggerWrongWayAudioLoop() {
        if (wrongWayInterval) return;
        const alertPhrase = "WRONG WAY! YOU ARE DRIVING THE WRONG WAY IN THE SPECIAL STAGE! TURN THE CAR IMMEDIATELY";
        speak(alertPhrase);
        wrongWayInterval = setInterval(() => {
            speak(alertPhrase);
        }, 2000); 
    }

    function stopWrongWayAudioLoop() {
        if (wrongWayInterval) {
            clearInterval(wrongWayInterval);
            wrongWayInterval = null;
        }
        isWrongWay = false;
        wrongWayStrikeCount = 0;
    }

    function announceCorrectDirectionDouble() {
        const clearPhrase = "CORRECT DIRECTION. GO!";
        speak(clearPhrase);
        setTimeout(() => { speak(clearPhrase); }, 1200); 
    }

    function announceBackOnTrackDouble() {
        const recoveryPhrase = "Back on track, GO";
        speak(recoveryPhrase);
        setTimeout(() => { speak(recoveryPhrase); }, 2000); 
    }

    function updateStats(pos) {
        const { latitude, longitude, accuracy, speed, altitude } = pos.coords;
        let curSpeed = speed ? speed * 3.6 : 0;
        
        if (lastCoords && accuracy < 20) {
            let timeDeltaSec = (Date.now() - lastCoords.time) / 1000;
            let spatialDeltaKM = calculateHaverDist(lastCoords.lat, lastCoords.lon, latitude, longitude);
            let mathematicalSpeed = timeDeltaSec > 0 ? (spatialDeltaKM / (timeDeltaSec / 3600)) : 0;
            
            if (mathematicalSpeed > 160 || (curSpeed === 0 && mathematicalSpeed > 6 && timeDeltaSec < 3)) {
                return; 
            }
        }

        const currSpeedEl = document.getElementById('currSpeed');
        const accEl = document.getElementById('accuracy');
        
        accEl.innerText = `Acc: ${accuracy.toFixed(1)}m`;
        accEl.style.background = accuracy < 15 ? "#34a853" : "#ea4335";
        currSpeedEl.innerText = Math.round(curSpeed);
        
        if (watchId && Math.random() < 0.1) { requestWakeLock(); }

        if (isWaitingForAccuracy && accuracy <= 10) {
            isWaitingForAccuracy = false; 
            accuracyAchieved = true;
            speak("Now you can go!");
            document.getElementById('totalArea').classList.add('go-flash');
            setTimeout(() => document.getElementById('totalArea').classList.remove('go-flash'), 5000);
            
            lastCoords = { lat: latitude, lon: longitude, ele: altitude || 0, time: Date.now() };
            
            if (currentMode === 'NAV' && navWaypoints.length > 0) {
                if (navStarted) {
                    activeWpIndex = findForwardNearestWaypointIndex(latitude, longitude);
                } else {
                    activeWpIndex = 0;
                }
                updateTargetDisplay();
            }

            if (currentMode === 'REC' && trackPoints.length === 0) {
                sessionStartTime = Date.now(); 
                startTimer();
                mark('start');
            } else if (currentMode === 'REC' || (currentMode === 'NAV' && navStarted)) {
                sessionStartTime = Date.now();
                startTimer();
            }
            saveStateToVault();
            return;
        }

        if (currentMode === 'NAV' && navWaypoints.length > 0 && accuracyAchieved) {
            const startPoint = navWaypoints[0];
            const distToStartGate = calculateHaverDist(latitude, longitude, startPoint.lat, startPoint.lon);

            if (!navStarted) {
                document.getElementById('partial').innerText = distToStartGate.toFixed(2);
                document.getElementById('total').innerText = "0.00";
                
                if (distToStartGate <= 0.005) { 
                    navStarted = true;
                    sessionStartTime = Date.now();
                    startTimer();
                    speak("The special stage has started");
                    activeWpIndex = 1;
                    updateTargetDisplay();
                }
            }

            if (navStarted) {
                let currentPathIdx = findClosestPathIndex(latitude, longitude);
                let finishPathIdx = navPathCoords.length - 1;
                let trackDistanceToFinish = calculateDistanceAlongPath(currentPathIdx, finishPathIdx);
                document.getElementById('total').innerText = trackDistanceToFinish.toFixed(2);

                let minPathDist = 999;
                for (let pt of navPathCoords) {
                    let d = calculateHaverDist(latitude, longitude, pt.lat, pt.lon);
                    if (d < minPathDist) minPathDist = d;
                }

                if (minPathDist <= 0.02 && !isOffTrack && lastCoords && curSpeed >= 2.5) {
                    let nextPathIdx = Math.min(currentPathIdx + 1, finishPathIdx);
                    if (currentPathIdx !== nextPathIdx) {
                        let dyTrack = navPathCoords[nextPathIdx].lat - navPathCoords[currentPathIdx].lat;
                        let dxTrack = navPathCoords[nextPathIdx].lon - navPathCoords[currentPathIdx].lon;
                        let trackBearing = Math.atan2(dyTrack, dxTrack) * 180 / Math.PI;

                        let dyUser = latitude - lastCoords.lat;
                        let dxUser = longitude - lastCoords.lon;
                        let userBearing = Math.atan2(dyUser, dxUser) * 180 / Math.PI;

                        let angleDiff = Math.abs(userBearing - trackBearing);
                        if (angleDiff > 180) angleDiff = 360 - angleDiff;

                        if (angleDiff > 135) {
                            wrongWayStrikeCount++;
                            if (wrongWayStrikeCount >= 5) { // Calibration filter safely extended to 5 seconds
                                if (!isWrongWay) {
                                    isWrongWay = true;
                                    document.body.classList.add('panic-mode');
                                    document.getElementById('partialLabel').innerText = "WRONG WAY!";
                                    triggerWrongWayAudioLoop();
                                }
                            }
                        } else {
                            wrongWayStrikeCount = 0; 
                            if (isWrongWay && angleDiff < 90) {
                                stopWrongWayAudioLoop();
                                document.body.classList.remove('panic-mode');
                                document.getElementById('partialLabel').innerText = "Distance to WP";
                                announceCorrectDirectionDouble();
                            }
                        }
                    }
                } else {
                    wrongWayStrikeCount = 0;
                }

                if (minPathDist > 0.08) { 
                    if (isWrongWay) stopWrongWayAudioLoop(); 
                    
                    if (!isOffTrack) { 
                        isOffTrack = true; 
                        document.body.classList.add('panic-mode'); 
                        document.getElementById('partialLabel').innerText = "Return to Track (Meters)";
                        offTrackAnchor = { lat: latitude, lon: longitude }; 
                    }
                }

                if (isOffTrack) {
                    let accumulatedDriftM = 80;
                    if (offTrackAnchor) {
                        let distFromAnchorM = calculateHaverDist(latitude, longitude, offTrackAnchor.lat, offTrackAnchor.lon) * 1000;
                        accumulatedDriftM += distFromAnchorM;
                    }
                    
                    let currentActualDistM = minPathDist * 1000;
                    document.getElementById('partial').innerText = "-" + Math.round(currentActualDistM);

                    if (Date.now() - lastOffTrackWarning > 10000 && !isWrongWay) {
                        speak("You are off course, return back");
                        lastOffTrackWarning = Date.now();
                    }

                    if (minPathDist < 0.01) { 
                        isOffTrack = false;
                        offTrackAnchor = null;
                        document.body.classList.remove('panic-mode');
                        document.getElementById('partialLabel').innerText = "Distance to WP";
                        announceBackOnTrackDouble(); 
                    }
                }

                if (!isOffTrack && !isWrongWay) {
                    const target = navWaypoints[activeWpIndex];
                    if (target) {
                        const distToWp = calculateHaverDist(latitude, longitude, target.lat, target.lon);
                        document.getElementById('partial').innerText = distToWp.toFixed(2);
                        
                        const distM = distToWp * 1000;
                        const cleanName = formatWpName(target.name);
                        const tulipNote = target.desc ? `, ${target.desc}` : "";

                        if (distM <= 2000 && distM > 1950 && !wpMarkersHit.p2km) {
                            speak("Approaching " + cleanName + " in 2 kilometers");
                            wpMarkersHit.p2km = true;
                        }
                        if (distM <= 1000 && distM > 950 && !wpMarkersHit.p1km) {
                            speak("Approaching " + cleanName + " in 1 kilometer");
                            wpMarkersHit.p1km = true;
                        }
                        if (distM <= 500 && distM > 450 && !wpMarkersHit.p500) {
                            speak("500 meters" + tulipNote);
                            wpMarkersHit.p500 = true;
                        }
                        if (distM <= 150 && distM > 140 && !wpMarkersHit.p150) {
                            speak("Approaching " + cleanName + " in 150 meters" + tulipNote);
                            wpMarkersHit.p150 = true;
                        }
                        if (distM <= 50 && distM > 40 && !wpMarkersHit.p50) {
                            speak("50 meters");
                            wpMarkersHit.p50 = true;
                        }
                        
                        if (distM <= 20) {
                            speak("Arrived at " + cleanName + tulipNote);
                            
                            if (target.name.toUpperCase().includes("FLYING")) {
                                handleResetAndStop(false);
                                speak("Special Stage Finished");
                                return;
                            }

                            activeWpIndex++;
                            
                            wpMarkersHit.p2km = false;
                            wpMarkersHit.p1km = false;
                            wpMarkersHit.p500 = false;
                            wpMarkersHit.p150 = false;
                            wpMarkersHit.p50 = false;
                            
                            updateTargetDisplay();
                            
                            if (activeWpIndex < navWaypoints.length) {
                                setTimeout(() => {
                                    let nextTarget = navWaypoints[activeWpIndex];
                                    let nextName = formatWpName(nextTarget.name);
                                    let nextDist = calculateHaverDist(latitude, longitude, nextTarget.lat, nextTarget.lon);
                                    speak("Distance to " + nextName + " is " + nextDist.toFixed(2) + " kilometers");
                                    
                                    let nextDistM = nextDist * 1000;
                                    if (nextDistM <= 530 && nextDistM >= 450) {
                                        wpMarkersHit.p500 = true; 
                                    }
                                    if (nextDistM <= 180 && nextDistM >= 140) {
                                        wpMarkersHit.p150 = true;
                                    }
                                }, 2500);
                            }
                        }
                    }
                }
            }
        }

        if (isWaitingForAccuracy || !watchId || accuracy > 40) return;
        
        if (curSpeed < 1.0) {
            resumeStrikeStartTime = null;
            if (!isAutoPaused && !stopTimeStart) stopTimeStart = Date.now();
            if (!isAutoPaused && stopTimeStart && (Date.now() - stopTimeStart > 60000)) {
                isAutoPaused = true; speak("Paused");
                if (navStarted && sessionStartTime) accumulatedTime += (Date.now() - sessionStartTime);
                clearInterval(timerInterval); releaseWakeLock();
                saveStateToVault();
            }
        } else if (curSpeed >= 2.0) {
            stopTimeStart = null;
            if (isAutoPaused) {
                if (!resumeStrikeStartTime) resumeStrikeStartTime = Date.now();
                if (Date.now() - resumeStrikeStartTime >= 3000) {
                    isAutoPaused = false; speak("Resumed");
                    if (navStarted) {
                        sessionStartTime = Date.now(); 
                        startTimer(); 
                    }
                    requestWakeLock();
                    saveStateToVault();
                }
            }
        }

        if (isAutoPaused || !lastCoords) return;
        const d = calculateHaverDist(lastCoords.lat, lastCoords.lon, latitude, longitude);
        if (d > 0.002) {
            if (currentMode === 'REC' || (currentMode === 'NAV' && navStarted)) {
                totalDist += d; partialDist += d;
            }
            if (currentMode === 'REC') {
                document.getElementById('total').innerText = totalDist.toFixed(2);
                document.getElementById('partial').innerText = partialDist.toFixed(2);
            }
            if (navStarted || currentMode === 'REC') {
                const elapsed = accumulatedTime + (sessionStartTime ? (Date.now() - sessionStartTime) : 0);
                if (elapsed > 0) {
                    document.getElementById('speed').innerText = (totalDist / (elapsed / 3600000)).toFixed(1);
                }
            }
            trackPoints.push({ lat: latitude, lon: longitude, ele: altitude || 0 });
            lastCoords = { lat: latitude, lon: longitude, ele: altitude || 0, time: Date.now() };
            saveStateToVault();
        }
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const ms = accumulatedTime + (sessionStartTime ? (Date.now() - sessionStartTime) : 0);
            const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    mainBtn = document.getElementById('toggleBtn'); 
    mainBtn.addEventListener('touchstart', (e) => {
        requestWakeLock();
        if (mainBtn.innerText.includes("START") || mainBtn.innerText === "RESUME") {
            isWaitingForAccuracy = true; 
            accuracyAchieved = false;
            isManualPaused = false;
            watchId = navigator.geolocation.watchPosition(updateStats, null, { enableHighAccuracy: true });
            mainBtn.innerText = "PAUSE"; mainBtn.className = "stop-btn";
            mainBtn.style.background = "#ea4335";
            speak("Waiting for GPS accuracy");
            saveStateToVault();
        } else {
            e.preventDefault();
            let p = 0;
            let itv = setInterval(() => {
                p += 2; mainBtn.style.background = `linear-gradient(to bottom, white ${p}%, #ea4335 ${p}%)`;
                if (p >= 100) { 
                    clearInterval(itv); 
                    handlePause(); 
                    mainBtn.style.background = "#34a853"; 
                }
            }, 60);
            mainBtn.addEventListener('touchend', () => { 
                clearInterval(itv); 
                mainBtn.style.background = "#ea4335"; 
                if(p<100) handlePause(); 
            }, {once:true});
        }
    });

    function handlePause() {
        speak("PAUSING NAVIGATION");
        isManualPaused = true;
        if (sessionStartTime) {
            accumulatedTime += (Date.now() - sessionStartTime);
            sessionStartTime = null;
        }
        clearInterval(timerInterval);
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = null;
        accuracyAchieved = false;
        stopWrongWayAudioLoop();
        document.body.classList.remove('panic-mode');
        releaseWakeLock();
        saveStateToVault();
    }

    function handleResetAndStop(showModal) {
        if (sessionStartTime) accumulatedTime += (Date.now() - sessionStartTime);
        clearInterval(timerInterval); 
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = null; isAutoPaused = false; navStarted = false; accuracyAchieved = false; isManualPaused = false;
        isOffTrack = false; offTrackAnchor = null;
        stopWrongWayAudioLoop();
        mainBtn.innerText = (currentMode === 'NAV') ? "START NAVIGATION" : "START TRACKING";
        mainBtn.className = "start-btn"; mainBtn.style.background = "#34a853";
        document.body.classList.remove('panic-mode');
        document.getElementById('partialLabel').innerText = (currentMode === 'NAV') ? "Distance to WP" : "Partial KM";
        releaseWakeLock();
        clearVault();
        if (showModal && currentMode === 'REC') {
            const count = waypoints.filter(w => w.type === 's' || w.type === 'rp' || w.type === 'nos').length;
            document.getElementById('modalData').innerHTML = `• KM: ${totalDist.toFixed(2)}<br>• RALLY WAYPOINTS: ${count}<br>• AVG: ${document.getElementById('speed').innerText} KM/H`;
            document.getElementById('reportModal').style.display = 'flex';
            setTimeout(() => { document.getElementById('stageName').focus(); }, 200);
        }
    }

    function saveFileName() {
        const input = document.getElementById('stageName');
        const saveBtn = document.getElementById('saveNameBtn');
        input.classList.add('locked');
        saveBtn.style.background = "#34a853"; saveBtn.innerText = "OK";
        document.getElementById('exportBtn').style.opacity = "1";
        document.getElementById('exportBtn').style.pointerEvents = "auto";
        speak("Stage name saved");
    }

    function closeModal() { 
        document.getElementById('reportModal').style.display = 'none'; 
        handleResetAndStop(false);
    }

    const pBtn = document.getElementById('resetPartialBtn');
    pBtn.onclick = () => { partialDist = 0; document.getElementById('partial').innerText = "0.00"; speak("Partial Reset"); saveStateToVault(); };

    function setupWaypointBtn(id, ringId, color, type) {
        const btn = document.getElementById(id);
        const ring = document.getElementById(ringId);
        let timer;
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            let deg = 0;
            timer = setInterval(() => {
                deg += 7.2;
                ring.style.background = `conic-gradient(${color} ${deg}deg, #444 ${deg}deg)`;
                if (deg >= 360) {
                    clearInterval(timer);
                    ring.style.background = `conic-gradient(transparent 0deg, #444 0deg)`;
                    mark(type);
                    partialDist = 0; document.getElementById('partial').innerText = "0.00"; 
                }
            }, 40); 
        });
        btn.addEventListener('touchend', () => { clearInterval(timer); ring.style.background = `conic-gradient(transparent 0deg, #444 0deg)`; });
    }

    setupWaypointBtn('btn-rp', 'ring-rp', '#fbbc05', 'double');
    setupWaypointBtn('btn-nos', 'ring-nos', '#1a73e8', 'long');
    setupWaypointBtn('btn-marshal', 'ring-marshal', '#e67e22', 'marshal');

    function mark(type) {
        if (!lastCoords) return;
        let n = "", s = "", iconKey = "";
        const dist = totalDist.toFixed(2);
        if (type === 'start') { n = "START FLAG"; iconKey = "start"; }
        else if (type === 'long') { n = "NO S"; s = `No Safety Marshal saved at ${dist} kilometers`; iconKey = "nos"; }
        else if (type === 'double') { n = `RP${globalWpCounter++}`; s = `Radio Point ${globalWpCounter-1} saved at ${dist} kilometers`; iconKey = "rp"; }
        else if (type === 'marshal') { n = `S${globalWpCounter++}`; s = `S ${globalWpCounter-1} saved at ${dist} kilometers`; iconKey = "s"; }
        waypoints.push({ lat: lastCoords.lat, lon: lastCoords.lon, ele: lastCoords.ele, name: `${n} | ${dist}KM`, type: iconKey });
        saveStateToVault();
        if(s) speak(s);
    }

    const totalArea = document.getElementById('totalArea');
    totalArea.addEventListener('touchstart', (e) => {
        e.preventDefault();
        let p = 0;
        let itv = setInterval(() => {
            p += 2; totalArea.style.background = `linear-gradient(to bottom, white ${p}%, #3d3d3d ${p}%)`;
            if (p >= 100) {
                clearInterval(itv); totalArea.style.background = "#3d3d3d";
                totalDist = 0; partialDist = 0; accumulatedTime = 0;
                trackPoints = []; waypoints = []; globalWpCounter = 1;
                isOffTrack = false; offTrackAnchor = null;
                stopWrongWayAudioLoop();
                document.body.classList.remove('panic-mode');
                document.getElementById('total').innerText = "0.00";
                document.getElementById('partial').innerText = "0.00";
                document.getElementById('timer').innerText = "00:00:00";
                document.getElementById('partialLabel').innerText = (currentMode === 'NAV') ? "Distance to WP" : "Partial KM";
                clearVault();
                speak("TOTAL KILOMETERS AND TIMER RESET");
            }
        }, 60);
        totalArea.addEventListener('touchend', () => { clearInterval(itv); totalArea.style.background = "#3d3d3d"; }, {once:true});
    });

    function exportKML() {
        const fileName = document.getElementById('stageName').value || "StageMaster_SS";
        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${fileName}</name>`;
        Object.keys(ICONS).forEach(key => {
            kml += `<Style id="${key}Icon"><IconStyle><Icon><href>${ICONS[key]}</href></Icon><scale>2.5</scale></IconStyle></Style>`;
        });
        waypoints.forEach(wp => {
            let style = wp.type ? `<styleUrl>#${wp.type}Icon</styleUrl>` : '';
            kml += `<Placemark><name>${wp.name}</name>${style}<Point><coordinates>${wp.lon},${wp.lat},${wp.ele}</coordinates></Point></Placemark>`;
        });
        if (trackPoints.length > 0) {
            const last = trackPoints[trackPoints.length - 1];
            kml += `<Placemark><name>FLYING FINISH | ${totalDist.toFixed(2)}KM</name><styleUrl>#finishIcon</styleUrl><Point><coordinates>${last.lon},${last.lat},${last.ele}</coordinates></Point></Placemark>`;
        }
        kml += `<Placemark><name>Path</name><Style><LineStyle><color>ff0000ff</color><width>5</width></LineStyle></Style><LineString><altitudeMode>relativeToGround</altitudeMode><coordinates>`;
        trackPoints.forEach(pt => { kml += `${pt.lon},${pt.lat},${pt.ele} `; });
        kml += `</coordinates></LineString></Placemark></Document></kml>`;
        clearVault();
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([kml], {type:'application/vnd.google-earth.kml+xml'})); a.download = `${fileName}.kml`; a.click();
    }
</script>
