<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StageMaster 3.37 Pro</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; color: white; margin: 0; padding-top: env(safe-area-inset-top); min-height: 100vh; justify-content: space-between; }
        
        /* Golden Title Styling */
        .header { margin: 20px 0; text-align: center; }
        .header h1 { 
            margin: 0; 
            font-size: 2rem; 
            letter-spacing: 2px; 
            background: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            font-weight: 900;
        }

        .card { background: #2d2d2d; padding: 1.5rem; border-radius: 25px; width: 92%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .metric { margin: 10px 0; padding: 15px; border-radius: 15px; background: #3d3d3d; position: relative; }
        .total-box { border-left: 8px solid #ea4335; }
        .partial-box { border-left: 8px solid #1a73e8; background: #253b5e; }
        .value { font-size: 4.5rem; font-weight: bold; font-family: monospace; }
        .label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        
        button { width: 100%; border: none; border-radius: 15px; font-weight: bold; text-transform: uppercase; margin-top: 10px; cursor: pointer; touch-action: manipulation; }
        .start-btn { background: #34a853; height: 70px; font-size: 1.5rem; color: white; }
        .stop-btn { background: #ea4335; height: 70px; font-size: 1.5rem; color: white; }
        .reset-btn { background: #1a73e8; height: 100px; font-size: 1.8rem; border-bottom: 6px solid #0d47a1; position: relative; overflow: hidden; color: white; }
        
        #progress-bar { position: absolute; bottom: 0; left: 0; height: 10px; background: #fbbc05; width: 0%; }
        
        .footer { margin-bottom: 20px; color: #666; font-size: 0.8rem; }

        #reportModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="header">
    <h1>STAGEMASTER BY PILI</h1>
</div>

<div class="card">
    <div class="metric">
        <div class="label">Speed (KM/H)</div>
        <div id="currSpeed" class="value" style="color:#fbbc05;">0</div>
    </div>
    <div class="metric total-box">
        <div class="label">Total Distance (KM)</div>
        <div id="total" class="value">0.00</div>
    </div>
    <div id="partialArea" class="metric partial-box">
        <div class="label">Partial Distance (KM)</div>
        <div id="partial" class="value">0.00</div>
        <div id="progress-bar"></div>
    </div>
    <button id="toggleBtn" class="start-btn">Start Stage</button>
    <button id="resetBtn" class="reset-btn">Reset Partial</button>
</div>

<div id="reportModal">
    <div style="background:#2d2d2d; padding:30px; border-radius:20px; text-align:center; border: 2px solid #fcf6ba;">
        <h3 style="color:#fcf6ba;">STAGE COMPLETE</h3>
        <p id="summaryText" style="font-size: 1.2rem;"></p>
        <button class="start-btn" onclick="exportKML()">EXPORT TO GOOGLE MAPS</button>
        <button class="stop-btn" style="height:50px; margin-top:20px;" onclick="location.reload()">DISCARD</button>
    </div>
</div>

<div class="footer">
    version 3.37
</div>

<script>
    let totalDist = 0, partialDist = 0, lastCoords = null, watchId = null;
    let trackPoints = [], waypoints = [], globalCounter = 1;
    let lastAlt = null;

    // --- AUTOMATED ASSETS ---
    const ICONS = {
        start: 'https://i.ibb.co/v4mK9Wp/rally-start.png',
        finish: 'https://i.ibb.co/YyYxS0H/rally-finish.png',
        s: 'https://i.ibb.co/r7v0xXj/orange-marshal.png',
        rp: 'https://i.ibb.co/m0fVzC3/yellow-thunder.png'
    };

    function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

    function filterAltitude(newAlt) {
        if (lastAlt === null) { lastAlt = newAlt; return newAlt; }
        if (Math.abs(newAlt - lastAlt) > 10) return lastAlt;
        lastAlt = newAlt; return newAlt;
    }

    function addWaypoint(type) {
        if (!lastCoords) return;
        let name = "";
        let iconUrl = "";

        if (type === 'start') { name = "START"; iconUrl = ICONS.start; }
        else if (type === 'finish') { name = "FLYING FINISH"; iconUrl = ICONS.finish; }
        else if (type === 's') { name = `S${globalCounter++}`; iconUrl = ICONS.s; }
        else if (type === 'rp') { name = `RP${globalCounter++}`; iconUrl = ICONS.rp; }

        waypoints.push({
            lat: lastCoords.lat, lon: lastCoords.lon, ele: lastCoords.ele,
            name: name, icon: iconUrl, dist: totalDist.toFixed(2)
        });
        speak(name);
    }

    let pressTimer, pWidth = 0;
    const resetBtn = document.getElementById('resetBtn');

    resetBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        pWidth = 0;
        pressTimer = setInterval(() => {
            pWidth += 4;
            document.getElementById('progress-bar').style.width = pWidth + "%";
            if (pWidth >= 100) {
                clearInterval(pressTimer);
                addWaypoint('rp'); // Thunder (RP)
                document.getElementById('progress-bar').style.width = "0%";
            }
        }, 120); 
    });

    resetBtn.addEventListener('touchend', () => {
        clearInterval(pressTimer);
        if (pWidth > 0 && pWidth < 100) {
            addWaypoint('s'); // Marshal (S)
            partialDist = 0;
            document.getElementById('partial').innerText = "0.00";
        }
        document.getElementById('progress-bar').style.width = "0%";
    });

    function updateGPS(pos) {
        const { latitude, longitude, speed, altitude } = pos.coords;
        const currentSpeed = (speed || 0) * 3.6;
        const filteredAlt = filterAltitude(altitude || 0);
        document.getElementById('currSpeed').innerText = Math.round(currentSpeed);

        if (lastCoords) {
            const d = calculateDistance(lastCoords.lat, lastCoords.lon, latitude, longitude);
            if (d > 0.002) {
                totalDist += d; partialDist += d;
                document.getElementById('total').innerText = totalDist.toFixed(2);
                document.getElementById('partial').innerText = partialDist.toFixed(2);
                trackPoints.push({ lat: latitude, lon: longitude, ele: filteredAlt });
            }
        }
        lastCoords = { lat: latitude, lon: longitude, ele: filteredAlt };
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)*Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    document.getElementById('toggleBtn').onclick = function() {
        if (!watchId) {
            watchId = navigator.geolocation.watchPosition(updateGPS, null, {enableHighAccuracy:true});
            this.innerText = "STOP STAGE"; this.className = "stop-btn";
            addWaypoint('start');
        } else {
            navigator.geolocation.clearWatch(watchId);
            addWaypoint('finish');
            document.getElementById('summaryText').innerText = `${totalDist.toFixed(2)} KM Covered`;
            document.getElementById('reportModal').style.display = 'flex';
        }
    };

    function exportKML() {
        let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <name>Rally Stage v3.37</name>
  <Style id="lineStyle"><LineStyle><color>ff0000ff</color><width>4</width></LineStyle></Style>`;

        waypoints.forEach((wp, i) => {
            kml += `
  <Style id="style${i}"><IconStyle><Icon><href>${wp.icon}</href></Icon><scale>1.2</scale></IconStyle></Style>
  <Placemark>
    <name>${wp.name}</name>
    <description>Distance: ${wp.dist} km</description>
    <styleUrl>#style${i}</styleUrl>
    <Point><coordinates>${wp.lon},${wp.lat},${wp.ele}</coordinates></Point>
  </Placemark>`;
        });

        kml += `
  <Placemark>
    <name>Stage Path</name>
    <styleUrl>#lineStyle</styleUrl>
    <LineString>
      <altitudeMode>relativeToGround</altitudeMode>
      <coordinates>`;
        trackPoints.forEach(pt => { kml += `${pt.lon},${pt.lat},${pt.ele} `; });
        kml += `</coordinates>
    </LineString>
  </Placemark>
</Document></kml>`;

        const blob = new Blob([kml], {type: 'application/vnd.google-earth.kml+xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `StageMaster_v337_${totalDist.toFixed(2)}km.kml`;
        a.click();
    }
</script>
</body>
</html>
