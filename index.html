<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StageMaster 4.65</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; color: white; margin: 0; padding-top: env(safe-area-inset-top, 10px); transition: background-color 0.3s; }
        .header h1 { margin: 5px 0; font-size: 1.8rem; color: #bf953f; text-transform: uppercase; font-weight: 900; }
        .header h1 span { text-transform: lowercase; font-size: 1.2rem; }
        .card { background: #2d2d2d; padding: 0.8rem; border-radius: 20px; width: 94%; max-width: 450px; text-align: center; position: relative; z-index: 10; box-sizing: border-box; }
        
        .mode-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 10px; }
        .mode-btn { height: 45px; background: #3d3d3d; color: #888; border-radius: 12px; font-size: 0.8rem; border: 2px solid transparent; }
        .mode-btn.active { background: #bf953f; color: black; border-color: white; }

        .metric { margin: 6px 0; padding: 8px; border-radius: 15px; background: #3d3d3d; position: relative; overflow: hidden; }
        .total-box { border-left: 6px solid #ea4335; }
        .partial-box { border-left: 6px solid #1a73e8; background: #253b5e; }
        .go-flash { animation: flashing-green 0.5s infinite; }
        @keyframes flashing-green { 0% { background: #3d3d3d; } 50% { background: #34a853; } 100% { background: #3d3d3d; } }
        
        .panic-mode { animation: panic-bg 0.5s infinite; }
        @keyframes panic-bg { 0% { background-color: #1a1a1a; } 50% { background-color: #7a1a1a; } 100% { background-color: #1a1a1a; } }

        .label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }
        .value { font-size: 3.8rem; font-weight: bold; font-family: monospace; line-height: 1; }
        
        button { border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; touch-action: none; position: relative; overflow: hidden; }
        .start-btn { background-color: #34a853; color: white; font-size: 1.4rem; height: 60px; width: 100%; margin-top: 8px; }
        .stop-btn { background-color: #ea4335; color: white; font-size: 1.4rem; height: 60px; width: 100%; margin-top: 8px; }
        .reset-partial-btn { background-color: #1a73e8; color: white; font-size: 1.5rem; height: 80px; width: 100%; margin-top: 8px; border-bottom: 5px solid #0d47a1; }
        
        .toolbar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; width: 100%; }
        .wp-btn { height: 100px; background: #1a1a1a; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: none; }
        .progress-ring { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; background: conic-gradient(transparent 0deg, #444 0deg); z-index: 1; }
        .wp-btn::after { content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px; background: #1a1a1a; border-radius: 50%; z-index: 2; }
        .wp-btn img { width: 55px; height: 55px; object-fit: contain; z-index: 3; margin-bottom: 2px; }
        .wp-label { font-size: 0.7rem; font-weight: bold; z-index: 3; }

        /* Isolated Dynamic Tulip Box Structure */
        .tulip-preview-container { display: none; background: #1a1a1a; border: 2px solid #555; border-radius: 15px; width: 100%; height: 100px; margin-top: 10px; align-items: center; justify-content: center; overflow: hidden; box-sizing: border-box; }
        .tulip-preview-container img { width: 100%; height: 100%; object-fit: contain; }

        #reportModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #2d2d2d; width: 85%; padding: 25px; border-radius: 25px; border: 2px solid #bf953f; text-align: center; }
    </style>
</head>
<body onload="checkStateRecovery()">

<div class="header"><h1>STAGEMASTER <span>by</span> PILI</h1></div>

<div class="card">
    <div class="mode-container">
        <button id="modeRec" class="mode-btn active" onclick="switchMode('REC')">REC MODE</button>
        <button id="modeNav" class="mode-btn" onclick="switchMode('NAV')">NAV MODE</button>
    </div>

    <div id="navControls" style="display: none; margin-bottom: 10px;">
        <input type="file" id="kmlInput" accept=".kml,application/vnd.google-earth.kml+xml,text/xml,application/xml" style="display: none;" onchange="startImport(event)">
        <button id="importBtn" class="start-btn" style="background-color: #1a73e8; height: 50px; font-size: 1rem;" onclick="document.getElementById('kmlInput').click()">IMPORT KML PATH</button>
    </div>

    <div class="metric">
        <div class="label">Speed KM/H</div>
        <div id="currSpeed" class="value" style="color:#fbbc05; font-size: 4.8rem;">0</div>
        <div id="accuracy" style="font-size: 0.7rem; padding: 4px 10px; border-radius: 10px; font-weight: bold; display: inline-block; background: #ea4335;">GPS: OFFLINE</div>
    </div>

    <div class="metric total-box" id="totalArea">
        <div class="label" id="totalLabel">Total (HOLD 3S TO RESET)</div>
        <div id="total" class="value">0.00</div>
    </div>

    <div class="metric partial-box">
        <div class="label" id="partialLabel">Partial KM</div>
        <div id="partial" class="value">0.00</div>
        <div id="wpTargetDisplay" style="font-size: 0.8rem; color: #fbbc05; font-weight: bold; margin-top: 5px; display: none;">TARGET: ---</div>
    </div>

    <button id="recToggleBtn" class="start-btn">START RECORDING</button>
    <button id="navToggleBtn" class="start-btn" style="display: none;">START NAVIGATION</button>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
        <div style="background: #3d3d3d; padding: 8px; border-radius: 12px;"><div class="label">Time</div><div id="timer" style="font-size: 1.4rem; font-weight: bold; font-family: monospace;">00:00:00</div></div>
        <div style="background: #3d3d3d; padding: 8px; border-radius: 12px;"><div class="label">Avg KM/H</div><div id="speed" style="font-size: 1.4rem; font-weight: bold; font-family: monospace;">0.0</div></div>
    </div>

    <button id="resetPartialBtn" class="reset-partial-btn">RESET PARTIAL</button>

    <div class="toolbar" id="recorderToolbar">
        <button class="wp-btn" id="btn-rp">
            <div class="progress-ring" id="ring-rp"></div>
            <img src="https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Yellow-thunder.png">
            <div class="wp-label" style="color: #fbbc05;">R P</div>
        </button>
        <button class="wp-btn" id="btn-nos">
            <div class="progress-ring" id="ring-nos"></div>
            <img src="https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/blue_pin.png"> 
            <div class="wp-label" style="color: #1a73e8;">NO S</div>
        </button>
        <button class="wp-btn" id="btn-marshal">
            <div class="progress-ring" id="ring-marshal"></div>
            <img src="https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Orange-marshal.png">
            <div class="wp-label" style="color: #e67e22;">MARSHAL</div>
        </button>
    </div>

    <div class="tulip-preview-container" id="tulipLiveBox">
        <img id="tulipLiveImg" src="" alt="Tulip Roadbook Preview">
    </div>

    <div style="font-size: 0.6rem; color: #666; margin-top: 10px;">version 4.65</div>
</div>

<div id="reportModal">
    <div class="modal-content">
        <div style="color: #bf953f; font-size: 1.4rem; font-weight: bold; margin-bottom: 20px;">STAGE SUMMARY</div>
        <div id="modalData" style="text-align: left; font-family: monospace; color: white; margin-bottom: 5px; line-height: 1.6;"></div>
        <div class="stage-input-group">
            <input type="text" id="stageName" class="stage-input" placeholder="Name Stage (e.g. SS1)">
            <button id="saveNameBtn" class="confirm-name-btn" onclick="saveFileName()">SAVE</button>
        </div>
        <button id="exportBtn" class="start-btn" onclick="exportKML()">DOWNLOAD KML FILE</button>
        <button class="stop-btn" style="background: #555; height: 50px; margin-top: 15px;" onclick="closeModalAndResumeRecording()">CLOSE & RESUME</button>
    </div>
</div>

<script>
    let totalDist = 0, partialDist = 0, accumulatedTime = 0;
    let watchId = null, lastCoords = null, timerInterval = null, sessionStartTime = null, wakeLock = null;
    let isWaitingForAccuracy = false, trackPoints = [], waypoints = [], globalWpCounter = 1;
    let isAutoPaused = false, stopTimeStart = null, resumeStrikeStartTime = null;
    let currentMode = 'REC';
    
    let navWaypoints = [];
    let navPathCoords = [];
    let activeWpIndex = 0;
    let lastOffTrackWarning = 0;
    let navStarted = false;
    let isOffTrack = false;
    let wpMarkersHit = { p2km: false, p1km: false, p500: false, p150: false, p50: false };
    let accuracyAchieved = false;
    let isManualPaused = false;
    
    let offTrackAnchor = null; 
    let isWrongWay = false;
    let wrongWayInterval = null;
    let rBtn = null;
    let nBtn = null;

    let upstreamAnchor = null;
    let zeroSpeedAnchor = null;
    let wasSpeedZeroTriggered = false;
    let isAustereLoopRunning = false;

    // Track when the last waypoint was triggered to apply the 30-meter stay visual delay
    let clearedWpIndex = null;
    let clearedWpLat = null;
    let clearedWpLon = null;

    const ICONS = {
        start: 'https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Start-flag.png',
        finish: 'https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Flying-flag.png',
        s: 'https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Orange-marshal.png',
        rp: 'https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/Yellow-thunder.png',
        nos: 'https://raw.githubusercontent.com/Pilirallyapp/stagemaster/main/blue_pin.png'
    };

    function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
    
    async function requestWakeLock() { 
        try { 
            if ('wakeLock' in navigator) { 
                wakeLock = await navigator.wakeLock.request('screen'); 
            } 
        } catch (err) {} 
    }
    
    function releaseWakeLock() { 
        if (wakeLock !== null) { 
            wakeLock.release().then(() => { wakeLock = null; }); 
        } 
    }

    function formatWpName(name) {
        let clean = name.split('|')[0].trim();
        if (clean.toUpperCase().startsWith('RP')) return clean.replace(/RP/i, 'Radio Point ');
        if (clean.toUpperCase().startsWith('S')) return clean.replace(/S/i, 'S ');
        return clean;
    }

    // High Precision Text-to-Image Link & Base64 Data Harvester
    function extractTulipImageUrl(descText) {
        if (!descText) return null;
        
        // Priority 1: Match naked Base64 image data strings directly (Bypasses Google URL completely)
        const base64Match = descText.match(/(data:image\/[a-zA-Z]*;base64,[^\s<>""']+)/i);
        if (base64Match && base64Match[1]) return base64Match[1];

        // Priority 2: Match standard HTML img tags embedded with src containing web URLs but exclude google hosted images
        const imgTagMatch = descText.match(/<img[^>]+src=["']([^"']+)["']/i);
        if (imgTagMatch && imgTagMatch[1] && !imgTagMatch[1].includes("usercontent.google.com")) {
            return imgTagMatch[1];
        }
        
        // Priority 3: Match naked non-Google URL parameters that link to standard image extensions
        const urlMatch = descText.match(/(https?:\/\/[^\s<>""']+\.(?:png|jpg|jpeg|gif|webp))/i);
        if (urlMatch && urlMatch[1] && !urlMatch[1].includes("usercontent.google.com")) {
            return urlMatch[1];
        }
        
        return null;
    }

    // Clears or populates the graphic container safely with 30m stay rule handling logic
    function renderTulipPreview(descText) {
        const liveBox = document.getElementById('tulipLiveBox');
        const liveImg = document.getElementById('tulipLiveImg');
        
        if (currentMode !== 'NAV' || !navStarted) {
            liveBox.style.display = 'none';
            liveImg.src = "";
            return;
        }

        const imageUrl = extractTulipImageUrl(descText);
        if (imageUrl) {
            liveImg.src = imageUrl;
            liveBox.style.display = 'flex';
        } else {
            liveBox.style.display = 'none';
            liveImg.src = "";
        }
    }

    function saveStateToVault() {
        const state = {
            totalDist, partialDist, accumulatedTime,
            activeWpIndex, navStarted, currentMode,
            globalWpCounter, trackPoints, waypoints,
            navWaypoints, navPathCoords, wpMarkersHit,
            isManualPaused, isAutoPaused, accuracyAchieved,
            isOffTrack, offTrackAnchor, isWrongWay,
            upstreamAnchor, zeroSpeedAnchor, wasSpeedZeroTriggered, isAustereLoopRunning,
            clearedWpIndex, clearedWpLat, clearedWpLon,
            timestamp: Date.now()
        };
        localStorage.setItem('stagemaster_vault', JSON.stringify(state));
    }

    function checkStateRecovery() {
        rBtn = document.getElementById('recToggleBtn');
        nBtn = document.getElementById('navToggleBtn');
        const vaultData = localStorage.getItem('stagemaster_vault');
        if (!vaultData) return;
        try {
            const state = JSON.parse(vaultData);
            if (Date.now() - state.timestamp > 7200000) {
                localStorage.removeItem('stagemaster_vault');
                return;
            }
            totalDist = state.totalDist;
            partialDist = state.partialDist;
            accumulatedTime = state.accumulatedTime;
            activeWpIndex = state.activeWpIndex;
            navStarted = state.navStarted;
            globalWpCounter = state.globalWpCounter || 1;
            trackPoints = state.trackPoints || [];
            waypoints = state.waypoints || [];
            navWaypoints = state.navWaypoints || [];
            navPathCoords = state.navPathCoords || [];
            wpMarkersHit = state.wpMarkersHit || wpMarkersHit;
            isManualPaused = state.isManualPaused || false;
            isAutoPaused = state.isAutoPaused || false;
            accuracyAchieved = state.accuracyAchieved || false;
            isOffTrack = state.isOffTrack || false;
            offTrackAnchor = state.offTrackAnchor || null;
            isWrongWay = state.isWrongWay || false;
            upstreamAnchor = state.upstreamAnchor || null;
            zeroSpeedAnchor = state.zeroSpeedAnchor || null;
            wasSpeedZeroTriggered = state.wasSpeedZeroTriggered || false;
            isAustereLoopRunning = state.isAustereLoopRunning || false;
            clearedWpIndex = state.clearedWpIndex !== undefined ? state.clearedWpIndex : null;
            clearedWpLat = state.clearedWpLat !== undefined ? state.clearedWpLat : null;
            clearedWpLon = state.clearedWpLon !== undefined ? state.clearedWpLon : null;

            switchMode(state.currentMode || 'REC');

            document.getElementById('total').innerText = totalDist.toFixed(2);
            
            if (currentMode === 'NAV' && isOffTrack && offTrackAnchor) {
                document.getElementById('partialLabel').innerText = "Return to Track (Meters)";
                document.getElementById('partial').innerText = "---";
            } else {
                document.getElementById('partial').innerText = partialDist.toFixed(2);
            }

            const ms = accumulatedTime;
            const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

            if (navWaypoints.length > 0) {
                updateTargetDisplay();
                if (navStarted) {
                    if (clearedWpIndex !== null && navWaypoints[clearedWpIndex]) {
                        renderTulipPreview(navWaypoints[clearedWpIndex].desc);
                    } else if (navWaypoints[activeWpIndex]) {
                        renderTulipPreview(navWaypoints[activeWpIndex].desc);
                    }
                }
            }

            if (currentMode === 'REC') {
                if (isManualPaused) {
                    rBtn.innerText = "RESUME REC"; rBtn.className = "start-btn"; rBtn.style.background = "#34a853";
                } else if (watchId) {
                    rBtn.innerText = "PAUSE REC"; rBtn.className = "stop-btn"; rBtn.style.background = "#ea4335";
                    startTimer();
                }
            } else if (currentMode === 'NAV') {
                if (isManualPaused || (!watchId && navStarted)) {
                    nBtn.innerText = "RESUME NAV"; nBtn.className = "start-btn"; nBtn.style.background = "#34a853";
                } else if (watchId) {
                    nBtn.innerText = "PAUSE NAV"; nBtn.className = "stop-btn"; nBtn.style.background = "#ea4335";
                    if (navStarted) startTimer();
                }
            }
            
            if (isOffTrack || isWrongWay) document.body.classList.add('panic-mode');
            if (isWrongWay && !wasSpeedZeroTriggered) triggerWrongWayAudioLoop();
            
            requestWakeLock();
            speak("Session recovered from memory vault.");
        } catch(e) {
            localStorage.removeItem('stagemaster_vault');
        }
    }

    function clearVault() {
        localStorage.removeItem('stagemaster_vault');
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('modeRec').classList.toggle('active', mode === 'REC');
        document.getElementById('modeNav').classList.toggle('active', mode === 'NAV');
        document.getElementById('recorderToolbar').style.display = (mode === 'REC') ? 'grid' : 'none';
        document.getElementById('navControls').style.display = (mode === 'NAV') ? 'block' : 'none';
        document.getElementById('wpTargetDisplay').style.display = (mode === 'NAV') ? 'block' : 'none';
        document.getElementById('resetPartialBtn').style.display = (mode === 'REC') ? 'block' : 'none';
        document.getElementById('totalLabel').innerText = (mode === 'NAV') ? 'Distance to Finish' : 'Total (HOLD 3S TO RESET)';
        
        rBtn = document.getElementById('recToggleBtn');
        nBtn = document.getElementById('navToggleBtn');
        if (mode === 'REC') {
            rBtn.style.display = "block";
            nBtn.style.display = "none";
            document.getElementById('tulipLiveBox').style.display = 'none';
        } else {
            rBtn.style.display = "none";
            nBtn.style.display = "block";
            if (navStarted) {
                if (clearedWpIndex !== null && navWaypoints[clearedWpIndex]) {
                    renderTulipPreview(navWaypoints[clearedWpIndex].desc);
                } else if (navWaypoints[activeWpIndex]) {
                    renderTulipPreview(navWaypoints[activeWpIndex].desc);
                }
            }
        }

        if (mode === 'NAV' && isOffTrack) {
            document.getElementById('partialLabel').innerText = "Return to Track (Meters)";
        } else if (mode === 'NAV' && isWrongWay) {
            document.getElementById('partialLabel').innerText = "WRONG WAY!";
        } else {
            document.getElementById('partialLabel').innerText = (mode === 'NAV') ? 'Distance to WP' : 'Partial KM';
        }
        
        if (mode === 'NAV' && navWaypoints.length > 0) {
            document.getElementById('importBtn').style.backgroundColor = "#34a853";
            document.getElementById('importBtn').innerText = `COMPLETED: ${activeWpIndex} / ${navWaypoints.length}`;
        } else if (mode === 'NAV') {
            document.getElementById('importBtn').style.backgroundColor = "#1a73e8";
            document.getElementById('importBtn').innerText = "IMPORT KML PATH";
        }
        updateTargetDisplay();
        speak(mode === 'REC' ? "Recording mode" : "Navigation mode");
    }

    function startImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
            navWaypoints = [];
            navPathCoords = [];

            const placemarks = xmlDoc.getElementsByTagName("Placemark");
            for (let i = 0; i < placemarks.length; i++) {
                const name = placemarks[i].getElementsByTagName("name")[0]?.textContent || "";
                const descNode = placemarks[i].getElementsByTagName("description")[0];
                const description = descNode ? descNode.textContent.trim() : "";
                
                const point = placemarks[i].getElementsByTagName("Point")[0];
                if (point) {
                    const coords = point.getElementsByTagName("coordinates")[0].textContent.trim().split(",");
                    navWaypoints.push({ 
                        name: name, 
                        desc: description, 
                        lon: parseFloat(coords[0]), 
                        lat: parseFloat(coords[1]) 
                    });
                }

                const line = placemarks[i].getElementsByTagName("LineString")[0];
                if (line) {
                    const pts = line.getElementsByTagName("coordinates")[0].textContent.trim().split(/\s+/);
                    pts.forEach(p => {
                        if (p.trim()) {
                            const c = p.split(",");
                            navPathCoords.push({ lon: parseFloat(c[0]), lat: parseFloat(c[1]) });
                        }
                    });
                }
            }

            if (navPathCoords.length === 0) {
                const globalLines = xmlDoc.getElementsByTagName("LineString");
                for (let j = 0; j < globalLines.length; j++) {
                    const pts = globalLines[j].getElementsByTagName("coordinates")[0].textContent.trim().split(/\s+/);
                    pts.forEach(p => {
                        if (p.trim()) {
                            const c = p.split(",");
                            navPathCoords.push({ lon: parseFloat(c[0]), lat: parseFloat(c[1]) });
                        }
                    });
                }
            }

            document.getElementById('importBtn').style.backgroundColor = "#34a853";
            document.getElementById('importBtn').innerText = "LOADED: " + navWaypoints.length + " WP";
            activeWpIndex = 0;
            navStarted = false;
            accuracyAchieved = false;
            isManualPaused = false;
            isOffTrack = false;
            offTrackAnchor = null;
            stopWrongWayAudioLoop();
            upstreamAnchor = null;
            zeroSpeedAnchor = null;
            wasSpeedZeroTriggered = false;
            isAustereLoopRunning = false;
            clearedWpIndex = null;
            clearedWpLat = null;
            clearedWpLon = null;
            document.getElementById('tulipLiveBox').style.display = 'none';
            nBtn.innerText = "START NAVIGATION"; nBtn.className = "start-btn"; nBtn.style.background = "#34a853";
            document.body.classList.remove('panic-mode');
            updateTargetDisplay();
            saveStateToVault();
            speak(navWaypoints.length + " waypoints UPLOADED.");
        };
        reader.readAsText(file);
    }

    function updateTargetDisplay() {
        if (currentMode !== 'NAV') return;
        
        if (!navStarted && navWaypoints.length > 0) {
            document.getElementById('wpTargetDisplay').innerText = "TARGET: START GATE";
            return;
        }

        if (navWaypoints[activeWpIndex]) {
            let name = navWaypoints[activeWpIndex].name.split('|')[0].trim();
            document.getElementById('wpTargetDisplay').innerText = "TARGET: " + name;
        }
        if (navWaypoints.length > 0) {
            document.getElementById('importBtn').innerText = `COMPLETED: ${activeWpIndex} / ${navWaypoints.length}`;
        }
    }

    function calculateHaverDist(l1, lo1, l2, lo2) {
        const R = 6371;
        const dLat = (l2-l1)*Math.PI/180, dLon = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function findClosestPathIndex(lat, lon) {
        let minD = 999, closestIdx = 0;
        for (let i = 0; i < navPathCoords.length; i++) {
            let d = calculateHaverDist(lat, lon, navPathCoords[i].lat, navPathCoords[i].lon);
            if (d < minD) { minD = d; closestIdx = i; }
        }
        return closestIdx;
    }

    function findForwardNearestWaypointIndex(lat, lon) {
        let targetIndex = activeWpIndex;
        let minWpDist = 999;
        for (let i = activeWpIndex; i < navWaypoints.length; i++) {
            let d = calculateHaverDist(lat, lon, navWaypoints[i].lat, navWaypoints[i].lon);
            if (d < minWpDist) {
                minWpDist = d;
                targetIndex = i;
            }
        }
        return targetIndex;
    }

    function calculateDistanceAlongPath(startIdx, endIdx) {
        let total = 0;
        if (startIdx >= endIdx) return 0;
        for (let i = startIdx; i < endIdx; i++) {
            total += calculateHaverDist(navPathCoords[i].lat, navPathCoords[i].lon, navPathCoords[i+1].lat, navPathCoords[i+1].lon);
        }
        return total;
    }

    function triggerWrongWayAudioLoop() {
        if (wrongWayInterval) return;
        isAustereLoopRunning = false;
        const alertPhrase = "WRONG WAY! YOU ARE DRIVING THE WRONG WAY IN THE SPECIAL STAGE! TURN THE CAR IMMEDIATELY";
        speak(alertPhrase);
        wrongWayInterval = setInterval(() => {
            speak(alertPhrase);
        }, 2000); 
    }

    function triggerAustereAudioLoop() {
        if (wrongWayInterval) { clearInterval(wrongWayInterval); wrongWayInterval = null; }
        isAustereLoopRunning = true;
        const austerePhrase = "Listen! you are driving the wrong way in the special stage. It is Dangerous, turn around immediately!";
        speak(austerePhrase);
        wrongWayInterval = setInterval(() => {
            speak(austerePhrase);
        }, 3000);
    }

    function stopWrongWayAudioLoop() {
        if (wrongWayInterval) { clearInterval(wrongWayInterval); wrongWayInterval = null; }
        isWrongWay = false;
        upstreamAnchor = null;
        zeroSpeedAnchor = null;
        wasSpeedZeroTriggered = false;
        isAustereLoopRunning = false;
    }

    function announceCorrectDirectionDouble() {
        const clearPhrase = "CORRECT DIRECTION. GO!";
        speak(clearPhrase);
        setTimeout(() => { speak(clearPhrase); }, 1200);
    }

    function announceBackOnTrackDouble() {
        const recoveryPhrase = "Back on track, GO";
        speak(recoveryPhrase);
        setTimeout(() => { speak(recoveryPhrase); }, 2000);
    }

    function updateStats(pos) {
        const { latitude, longitude, accuracy, speed, altitude } = pos.coords;
        let curSpeed = speed ? speed * 3.6 : 0;

        if (lastCoords && accuracy < 20) {
            let timeDeltaSec = (Date.now() - lastCoords.time) / 1000;
            let spatialDeltaKM = calculateHaverDist(lastCoords.lat, lastCoords.lon, latitude, longitude);
            let mathematicalSpeed = timeDeltaSec > 0 ? (spatialDeltaKM / (timeDeltaSec / 3600)) : 0;
            if (mathematicalSpeed > 160 || (curSpeed === 0 && mathematicalSpeed > 6 && timeDeltaSec < 3)) {
                return;
            }
        }

        const currSpeedEl = document.getElementById('currSpeed');
        const accEl = document.getElementById('accuracy');
        accEl.innerText = `Acc: ${accuracy.toFixed(1)}m`;
        accEl.style.background = accuracy < 15 ? "#34a853" : "#ea4335";
        currSpeedEl.innerText = Math.round(curSpeed);

        if (watchId && Math.random() < 0.1) { requestWakeLock(); }

        if (isWaitingForAccuracy && accuracy <= 10) {
            isWaitingForAccuracy = false;
            accuracyAchieved = true;
            speak("Now you can go!");
            document.getElementById('totalArea').classList.add('go-flash');
            setTimeout(() => document.getElementById('totalArea').classList.remove('go-flash'), 5000);
            
            lastCoords = { lat: latitude, lon: longitude, ele: altitude || 0, time: Date.now() };
            if (currentMode === 'NAV' && navWaypoints.length > 0) {
                if (navStarted) {
                    activeWpIndex = findForwardNearestWaypointIndex(latitude, longitude);
                } else {
                    activeWpIndex = 0;
                }
                updateTargetDisplay();
                if (navStarted) {
                    if (clearedWpIndex !== null && navWaypoints[clearedWpIndex]) {
                        renderTulipPreview(navWaypoints[clearedWpIndex].desc);
                    } else if (navWaypoints[activeWpIndex]) {
                        renderTulipPreview(navWaypoints[activeWpIndex].desc);
                    }
                }
            }

            if (currentMode === 'REC' && trackPoints.length === 0) {
                sessionStartTime = Date.now();
                startTimer();
                mark('start');
            } else if (currentMode === 'REC' || (currentMode === 'NAV' && navStarted)) {
                sessionStartTime = Date.now();
                startTimer();
            }
            saveStateToVault();
            return;
        }

        if (currentMode === 'NAV' && navWaypoints.length > 0 && accuracyAchieved) {
            const startPoint = navWaypoints[0];
            const distToStartGate = calculateHaverDist(latitude, longitude, startPoint.lat, startPoint.lon);

            if (!navStarted) {
                document.getElementById('partial').innerText = distToStartGate.toFixed(2);
                document.getElementById('total').innerText = "0.00";
                if (distToStartGate <= 0.005) {
                    navStarted = true;
                    sessionStartTime = Date.now();
                    startTimer();
                    speak("The special stage has started");
                    activeWpIndex = 1;
                    updateTargetDisplay();
                    if (navWaypoints[activeWpIndex]) {
                        renderTulipPreview(navWaypoints[activeWpIndex].desc);
                        partialDist = calculateHaverDist(latitude, longitude, navWaypoints[activeWpIndex].lat, navWaypoints[activeWpIndex].lon);
                    }
                }
            }

            if (navStarted) {
                let currentPathIdx = findClosestPathIndex(latitude, longitude);
                let finishPathIdx = navPathCoords.length - 1;
                let trackDistanceToFinish = calculateDistanceAlongPath(currentPathIdx, finishPathIdx);
                document.getElementById('total').innerText = trackDistanceToFinish.toFixed(2);

                let minPathDist = 999;
                for (let pt of navPathCoords) {
                    let d = calculateHaverDist(latitude, longitude, pt.lat, pt.lon);
                    if (d < minPathDist) minPathDist = d;
                }

                if (minPathDist <= 0.035 && !isOffTrack && lastCoords) {
                    let nextPathIdx = Math.min(currentPathIdx + 1, finishPathIdx);
                    let angleDiff = 0;
                    if (currentPathIdx !== nextPathIdx) {
                        let dyTrack = navPathCoords[nextPathIdx].lat - navPathCoords[currentPathIdx].lat;
                        let dxTrack = navPathCoords[nextPathIdx].lon - navPathCoords[currentPathIdx].lon;
                        let trackBearing = Math.atan2(dyTrack, dxTrack) * 180 / Math.PI;

                        let dyUser = latitude - lastCoords.lat;
                        let dxUser = longitude - lastCoords.lon;
                        let userBearing = Math.atan2(dyUser, dxUser) * 180 / Math.PI;

                        angleDiff = Math.abs(userBearing - trackBearing);
                        if (angleDiff > 180) angleDiff = 360 - angleDiff;
                    }

                    if (curSpeed < 1.0) {
                        if (isWrongWay && !wasSpeedZeroTriggered) {
                            if (wrongWayInterval) { clearInterval(wrongWayInterval); wrongWayInterval = null; }
                            speak("WRONG WAY! YOU ARE DRIVING THE WRONG WAY IN THE SPECIAL STAGE! TURN THE CAR IMMEDIATELY");
                            wasSpeedZeroTriggered = true;
                            zeroSpeedAnchor = { lat: latitude, lon: longitude };
                        }
                    } else {
                        if (angleDiff > 135) {
                            if (!isWrongWay) {
                                if (!upstreamAnchor) { upstreamAnchor = { lat: lastCoords.lat, lon: lastCoords.lon }; }
                                let displacementM = calculateHaverDist(upstreamAnchor.lat, upstreamAnchor.lon, latitude, longitude) * 1000;
                                if (displacementM >= 20) {
                                    isWrongWay = true;
                                    wasSpeedZeroTriggered = false;
                                    document.body.classList.add('panic-mode');
                                    document.getElementById('partialLabel').innerText = "WRONG WAY!";
                                    triggerWrongWayAudioLoop();
                                }
                            } else if (!isAustereLoopRunning) {
                                let travelSinceZeroM = zeroSpeedAnchor ? calculateHaverDist(zeroSpeedAnchor.lat, zeroSpeedAnchor.lon, latitude, longitude) * 1000 : 0;
                                if (travelSinceZeroM >= 15) { triggerAustereAudioLoop(); }
                            }
                        } else if (angleDiff < 45) {
                            if (isWrongWay) {
                                stopWrongWayAudioLoop();
                                document.body.classList.remove('panic-mode');
                                document.getElementById('partialLabel').innerText = "Distance to WP";
                                announceCorrectDirectionDouble();
                            }
                        }
                    }
                }

                if (minPathDist > 0.035) {
                    if (!isOffTrack) {
                        isOffTrack = true;
                        offTrackAnchor = { lat: latitude, lon: longitude };
                        document.body.classList.add('panic-mode');
                        document.getElementById('partialLabel').innerText = "Return to Track (Meters)";
                        document.getElementById('partial').innerText = "---";
                    }
                    let timeSinceWarning = Date.now() - lastOffTrackWarning;
                    if (timeSinceWarning > 7000) {
                        speak("You are off track! Return to the track path immediately");
                        lastOffTrackWarning = Date.now();
                    }
                } else {
                    if (isOffTrack) {
                        isOffTrack = false;
                        offTrackAnchor = null;
                        document.body.classList.remove('panic-mode');
                        document.getElementById('partialLabel').innerText = "Distance to WP";
                        announceBackOnTrackDouble();
                    }
                }

                if (!isOffTrack && lastCoords) {
                    let spatialDeltaKM = calculateHaverDist(lastCoords.lat, lastCoords.lon, latitude, longitude);
                    partialDist -= spatialDeltaKM;
                    if (partialDist < 0) partialDist = 0;
                }

                if (!isOffTrack && navWaypoints[activeWpIndex]) {
                    const targetWp = navWaypoints[activeWpIndex];
                    const straightLineDistM = calculateHaverDist(latitude, longitude, targetWp.lat, targetWp.lon) * 1000;
                    
                    let cleanWpName = formatWpName(targetWp.name);
                    let customInstruction = "";
                    if (targetWp.desc && !targetWp.desc.startsWith('<img') && !targetWp.desc.includes('data:image')) {
                        customInstruction = targetWp.desc.split('|')[0].trim();
                    }

                    if (straightLineDistM <= 35) {
                        speak("Clear " + cleanWpName);
                        
                        clearedWpIndex = activeWpIndex;
                        clearedWpLat = targetWp.lat;
                        clearedWpLon = targetWp.lon;
                        renderTulipPreview(targetWp.desc);

                        wpMarkersHit = { p2km: false, p1km: false, p500: false, p150: false, p50: false };
                        activeWpIndex++;
                        updateTargetDisplay();
                        
                        if (activeWpIndex < navWaypoints.length) {
                            let nextWp = navWaypoints[activeWpIndex];
                            partialDist = calculateHaverDist(latitude, longitude, nextWp.lat, nextWp.lon);
                            let nextCleanName = formatWpName(nextWp.name);
                            speak("Next waypoint, " + nextCleanName + " in " + (partialDist * 1000).toFixed(0) + " meters");
                        } else {
                            handleNavigationFinish();
                        }
                    } else {
                        let distM = partialDist * 1000;
                        if (distM <= 2005 && distM > 1990 && !wpMarkersHit.p2km) { wpMarkersHit.p2km = true; speak("Two kilometers to " + cleanWpName); }
                        else if (distM <= 1005 && distM > 1990 && !wpMarkersHit.p1km) { wpMarkersHit.p1km = true; speak("One kilometer to " + cleanWpName); }
                        else if (distM <= 505 && distM > 490 && !wpMarkersHit.p500) { 
                            wpMarkersHit.p500 = true; 
                            speak("Five hundred meters to " + cleanWpName); 
                            if (customInstruction) { setTimeout(() => { speak(customInstruction); }, 2200); }
                        }
                        else if (distM <= 155 && distM > 140 && !wpMarkersHit.p150) { 
                            wpMarkersHit.p150 = true; 
                            speak("One hundred fifty meters"); 
                            if (customInstruction) { setTimeout(() => { speak(customInstruction); }, 1500); }
                        }
                        else if (distM <= 55 && distM > 40 && !wpMarkersHit.p50) { wpMarkersHit.p50 = true; speak("Fifty meters"); }
                    }
                }

                if (clearedWpIndex !== null && clearedWpLat !== null && clearedWpLon !== null) {
                    let distFromClearedWpM = calculateHaverDist(latitude, longitude, clearedWpLat, clearedWpLon) * 1000;
                    if (distFromClearedWpM > 30) {
                        clearedWpIndex = null; clearedWpLat = null; clearedWpLon = null;
                        if (navWaypoints[activeWpIndex]) { renderTulipPreview(navWaypoints[activeWpIndex].desc); }
                        else { document.getElementById('tulipLiveBox').style.display = 'none'; }
                    }
                }

                if (!isOffTrack) {
                    document.getElementById('partial').innerText = partialDist.toFixed(2);
                }
            }
        }

        if (currentMode === 'REC' && watchId && !isManualPaused && !isAutoPaused) {
            if (lastCoords) {
                let d = calculateHaverDist(lastCoords.lat, lastCoords.lon, latitude, longitude);
                if (accuracy < 15) {
                    totalDist += d;
                    partialDist += d;
                    document.getElementById('total').innerText = totalDist.toFixed(2);
                    document.getElementById('partial').innerText = partialDist.toFixed(2);
                }
            }
            trackPoints.push({ lat: latitude, lon: longitude, ele: altitude || 0, time: Date.now() });
        }

        lastCoords = { lat: latitude, lon: longitude, ele: altitude || 0, time: Date.now() };
        saveStateToVault();
    }

    function handleNavigationFinish() {
        stopGPS();
        stopTimer();
        speak("You have reached the flying finish. Special stage completed.");
        
        let min = Math.floor(accumulatedTime / 60000);
        let sec = Math.floor((accumulatedTime % 60000) / 1000);
        let ms = Math.floor((accumulatedTime % 1000) / 10);
        let timeStr = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;

        let avgSpeed = accumulatedTime > 0 ? (totalDist / (accumulatedTime / 3600000)) : 0;

        document.getElementById('modalData').innerHTML = `
            <b>STAGE DISTANCE:</b> ${totalDist.toFixed(2)} KM<br>
            <b>STAGE TIME:</b> ${timeStr}<br>
            <b>AVERAGE SPEED:</b> ${avgSpeed.toFixed(1)} KM/H
        `;
        document.getElementById('stageName').value = "";
        document.getElementById('reportModal').style.display = 'flex';
        clearVault();
    }

    function handleError(err) {
        let msg = "GPS Error";
        if (err.code === 1) msg = "PERMISSION DENIED";
        else if (err.code === 2) msg = "POSITION UNAVAILABLE";
        else if (err.code === 3) msg = "TIMEOUT";
        document.getElementById('accuracy').innerText = msg;
        document.getElementById('accuracy').style.background = "#ea4335";
    }

    function startGPS() {
        if (watchId) return;
        isWaitingForAccuracy = true;
        accuracyAchieved = false;
        speak("Waiting for high accuracy GPS satellite synchronization.");
        watchId = navigator.geolocation.watchPosition(updateStats, handleError, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        });
    }

    function stopGPS() {
        if (watchId) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
        document.getElementById('accuracy').innerText = "GPS: OFFLINE";
        document.getElementById('accuracy').style.background = "#ea4335";
    }

    function startTimer() {
        if (timerInterval) return;
        let lastTick = Date.now();
        timerInterval = setInterval(() => {
            if (!isManualPaused && !isAutoPaused) {
                let now = Date.now();
                accumulatedTime += (now - lastTick);
                lastTick = now;
                
                let ms = accumulatedTime;
                let h = Math.floor(ms / 3600000);
                let m = Math.floor((ms % 3600000) / 60000);
                let s = Math.floor((ms % 60000) / 1000);
                document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                
                let avgSpeed = accumulatedTime > 0 ? (totalDist / (accumulatedTime / 3600000)) : 0;
                document.getElementById('speed').innerText = avgSpeed.toFixed(1);
            } else {
                lastTick = Date.now();
            }
        }, 200);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function toggleRecording() {
        rBtn = document.getElementById('recToggleBtn');
        if (currentMode !== 'REC') return;

        if (!watchId) {
            isManualPaused = false;
            isAutoPaused = false;
            startGPS();
            rBtn.innerText = "PAUSE REC"; rBtn.className = "stop-btn"; rBtn.style.background = "#ea4335";
        } else {
            if (!isManualPaused) {
                isManualPaused = true;
                stopTimer();
                rBtn.innerText = "RESUME REC"; rBtn.className = "start-btn"; rBtn.style.background = "#34a853";
                speak("Recording paused.");
            } else {
                isManualPaused = false;
                startTimer();
                rBtn.innerText = "PAUSE REC"; rBtn.className = "stop-btn"; rBtn.style.background = "#ea4335";
                speak("Recording resumed.");
            }
        }
        saveStateToVault();
    }

    function toggleNavigation() {
        nBtn = document.getElementById('navToggleBtn');
        if (currentMode !== 'NAV') return;
        if (navWaypoints.length === 0) { speak("Please upload a KML profile first."); return; }

        if (!watchId) {
            isManualPaused = false;
            startGPS();
            nBtn.innerText = "PAUSE NAV"; nBtn.className = "stop-btn"; nBtn.style.background = "#ea4335";
        } else {
            if (!isManualPaused) {
                isManualPaused = true;
                stopTimer();
                nBtn.innerText = "RESUME NAV"; nBtn.className = "start-btn"; nBtn.style.background = "#34a853";
                speak("Navigation paused.");
            } else {
                isManualPaused = false;
                if (navStarted) startTimer();
                nBtn.innerText = "PAUSE NAV"; nBtn.className = "stop-btn"; nBtn.style.background = "#ea4335";
                speak("Navigation resumed.");
            }
        }
        saveStateToVault();
    }

    function resetPartial() {
        if (currentMode !== 'REC') return;
        partialDist = 0;
        document.getElementById('partial').innerText = "0.00";
        speak("Partial reset");
        saveStateToVault();
    }

    function mark(type) {
        if (!watchId || isManualPaused || isAutoPaused) return;
        let lat = lastCoords ? lastCoords.lat : 0;
        let lon = lastCoords ? lastCoords.lon : 0;
        let ele = lastCoords ? lastCoords.ele : 0;
        
        let label = "";
        if (type === 'start') label = "START LINE | 0.00KM";
        else if (type === 'finish') label = `FLYING FINISH | ${totalDist.toFixed(2)}KM`;
        else {
            label = `${type.toUpperCase()}${globalWpCounter} | ${totalDist.toFixed(2)}KM`;
            globalWpCounter++;
        }
        
        waypoints.push({ name: label, desc: "", lat: lat, lon: lon, ele: ele });
        speak(type.toUpperCase() + " marked");
        saveStateToVault();
    }

    document.getElementById('recToggleBtn').addEventListener('click', toggleRecording);
    document.getElementById('navToggleBtn').addEventListener('click', toggleNavigation);
    document.getElementById('resetPartialBtn').addEventListener('click', resetPartial);

    // Setup recorder buttons hookups
    document.getElementById('btn-rp').addEventListener('click', () => mark('rp'));
    document.getElementById('btn-nos').addEventListener('click', () => mark('nos'));
    document.getElementById('btn-marshal').addEventListener('click', () => mark('s'));

    // Long Press handler for Total distance reset in REC mode
    let totalBtn = document.getElementById('totalArea');
    let pressTimer;
    totalBtn.addEventListener('touchstart', (e) => {
        if (currentMode !== 'REC') return;
        pressTimer = setTimeout(() => {
            totalDist = 0;
            partialDist = 0;
            document.getElementById('total').innerText = "0.00";
            document.getElementById('partial').innerText = "0.00";
            speak("Total metrics reset");
            saveStateToVault();
        }, 3000);
    });
    totalBtn.addEventListener('touchend', () => clearTimeout(pressTimer));

    function closeModalAndResumeRecording() {
        document.getElementById('reportModal').style.display = 'none';
        totalDist = 0; partialDist = 0; accumulatedTime = 0;
        trackPoints = []; waypoints = []; globalWpCounter = 1;
        clearedWpIndex = null; clearedWpLat = null; clearedWpLon = null;
        document.getElementById('total').innerText = "0.00";
        document.getElementById('partial').innerText = "0.00";
        document.getElementById('timer').innerText = "00:00:00";
        document.getElementById('speed').innerText = "0.0";
        
        if (currentMode === 'REC') {
            rBtn.innerText = "START RECORDING"; rBtn.className = "start-btn"; rBtn.style.background = "#34a853";
        } else {
            nBtn.innerText = "START NAVIGATION"; nBtn.className = "start-btn"; nBtn.style.background = "#34a853";
            navStarted = false;
            accuracyAchieved = false;
            updateTargetDisplay();
            document.getElementById('tulipLiveBox').style.display = 'none';
        }
        document.body.classList.remove('panic-mode');
        clearVault();
    }

    function saveFileName() {
        speak("Filename tag registered.");
    }

    function exportKML() {
        let nameField = document.getElementById('stageName').value.trim();
        let title = nameField ? nameField : "Stage_Master_Export";
        
        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${title}</name>`;
        
        kml += `
        <Style id="startIcon"><IconStyle><scale>1.3</scale><Icon><href>${ICONS.start}</href></Icon><hotSpot x="32" xunits="pixels" y="0" yunits="pixels"/></IconStyle></Style>
        <Style id="finishIcon"><IconStyle><scale>1.3</scale><Icon><href>${ICONS.finish}</href></Icon><hotSpot x="32" xunits="pixels" y="0" yunits="pixels"/></IconStyle></Style>
        <Style id="sIcon"><IconStyle><scale>1.1</scale><Icon><href>${ICONS.s}</href></Icon></IconStyle></Style>
        <Style id="rpIcon"><IconStyle><scale>1.1</scale><Icon><href>${ICONS.rp}</href></Icon></IconStyle></Style>
        <Style id="nosIcon"><IconStyle><scale>1.1</scale><Icon><href>${ICONS.nos}</href></Icon></IconStyle></Style>
        `;

        waypoints.forEach(wp => {
            let style = "rpIcon";
            if (wp.name.toLowerCase().includes("start")) style = "startIcon";
            else if (wp.name.toLowerCase().includes("finish")) style = "finishIcon";
            else if (wp.name.toLowerCase().includes("nos")) style = "nosIcon";
            else if (wp.name.toLowerCase().startsWith("s")) style = "sIcon";

            kml += `<Placemark><name>${wp.name}</name><description>${wp.desc}</description><styleUrl>#${style}</styleUrl><Point><coordinates>${wp.lon},${wp.lat},${wp.ele}</coordinates></Point></Placemark>`;
        });

        if (trackPoints.length > 0) {
            const last = trackPoints[trackPoints.length - 1];
            kml += `<Placemark><name>FLYING FINISH | ${totalDist.toFixed(2)}KM</name><styleUrl>#finishIcon</styleUrl><Point><coordinates>${last.lon},${last.lat},${last.ele}</coordinates></Point></Placemark>`;
        }

        kml += `<Placemark><name>Path</name><Style><LineStyle><color>ff0000ff</color><width>5</width></LineStyle></Style><LineString><altitudeMode>relativeToGround</altitudeMode><coordinates>`;
        trackPoints.forEach(pt => { kml += `${pt.lon},${pt.lat},${pt.ele} `; });
        kml += `</coordinates></LineString></Placemark></Document></kml>`;

        let blob = new Blob([kml], { type: "application/vnd.google-earth.kml+xml" });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${title.replace(/\s+/g, '_')}.kml`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        closeModalAndResumeRecording();
    }
</script>
